apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-agent
  namespace: opentelemetry
  labels:
    app.kubernetes.io/component: opentelemetry
    app.kubernetes.io/instance: agent
spec:
  mode: daemonset
  image: 'ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.142.0'
  replicas: 1
  ipFamilyPolicy: SingleStack
  managementState: managed
  upgradeStrategy: automatic
  env:
    - name: OTEL_AUTH_TOKEN
      valueFrom:
        secretKeyRef:
          key: OTEL_AUTH_TOKEN
          name: otel-agent-token
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: '0.0.0.0:4317'
          http:
            endpoint: '0.0.0.0:4318'
    processors:
      memory_limiter:
        check_interval: 2s
        limit_percentage: 80
        spike_limit_percentage: 20
      batch:
        send_batch_size: 512
        timeout: 5s
    exporters:
      otlp:
        endpoint: 'otel-gateway-collector.opentelemetry.svc.cluster.local:4317'
        headers:
          authorization: 'Bearer ${env:OTEL_AUTH_TOKEN}'
        retry_on_failure:
          enabled: true
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 10000
        tls:
          insecure: true
    extensions:
      health_check:
        endpoint: '0.0.0.0:13133'
        path: /
    service:
      extensions:
        - health_check
      pipelines:
        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - otlp
      telemetry:
        logs:
          level: info
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
  targetAllocator:
    allocationStrategy: consistent-hashing
    collectorNotReadyGracePeriod: 30s
    collectorTargetReloadInterval: 30s
    filterStrategy: relabel-config
    observability:
      metrics: {}
    prometheusCR:
      scrapeInterval: 30s
    resources: {}
  configVersions: 3