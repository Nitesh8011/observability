spec:
  config:
    receivers:
      hostmetrics:
        collection_interval: 30s
        scrapers:
          cpu: {}
          disk: {}
          filesystem: {}
          load: {}
          memory: {}
          network: {}
          processes: {}
      k8s_cluster:
        collection_interval: 30s
        node_conditions_to_report:
          - Ready
          - MemoryPressure
          - DiskPressure
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: otel-collector
              scrape_interval: 10s
              static_configs:
                - targets:
                    - 0.0.0.0:8888
    exporters:
      otlp:
        endpoint: otel-gateway.prospecta.com:443
        headers:
          authorization: Bearer ${env:OTEL_AUTH_TOKEN}
        retry_on_failure:
          enabled: true
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 10000
        tls:
          ca_file: /client-ca/ca.crt
          cert_file: /client-tls/tls.crt
          insecure: false
          key_file: /client-tls/tls.key
    processors:
      batch:
        send_batch_size: 512
        timeout: 5s
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
        passthrough: false
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      memory_limiter:
        check_interval: 2s
        limit_percentage: 80
        spike_limit_percentage: 20
      resource:
        attributes:
          - action: insert
            key: cluster.name
            value: AKS_QAM
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
        path: /
    service:
      extensions:
        - health_check
      telemetry:
        logs:
          level: info
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      pipelines:
        logs:
          exporters:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - resource
            - batch
          receivers:
            - otlp
        metrics:
          exporters:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - resource
            - batch
          receivers:
            - otlp
            - hostmetrics
            - k8s_cluster
            - prometheus
        traces:
          exporters:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - resource
            - batch
          receivers:
            - otlp
  deploymentUpdateStrategy: {}
  env:
    - name: OTEL_AUTH_TOKEN
      valueFrom:
        secretKeyRef:
          key: OTEL_AUTH_TOKEN
          name: otel-agent-token
    - name: NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
  image: >-
    ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.149.0
  ingress:
    route: {}
  managementState: managed
  mode: daemonset
  observability:
    metrics: {}
  replicas: 4
  resources:
    limits:
      memory: 4Gi
    requests:
      memory: 1Gi
  targetAllocator:
    allocationStrategy: per-node
    enabled: true
    filterStrategy: relabel-config
    observability:
      metrics: {}
    prometheusCR:
      enabled: true
      scrapeInterval: 30s
      serviceMonitorSelector:
        prometheus: grafana
    replicas: 4
    resources:
      limits:
        cpu: '1'
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
    serviceAccount: otel-agent-targetallocator
  updateStrategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  upgradeStrategy: automatic
  volumeMounts:
    - mountPath: /client-tls
      name: client-tls
      readOnly: true
    - mountPath: /client-ca
      name: client-ca
      readOnly: true
  volumes:
    - name: client-tls
      secret:
        secretName: otel-agent-tls
    - name: client-ca
      secret:
        secretName: otel-agent-ca