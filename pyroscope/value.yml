pyroscope:
  extraArgs:
    log.level: info
    config.expand-env: "true"

  extraEnvVars:
    POD_IP:
      valueFrom:
        fieldRef:
          fieldPath: status.podIP

  serviceAccount:
    create: true
    name: pyroscope

  # ✅ Correct key for Pyroscope Helm chart
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 100Gi
    annotations: {}

  config: |
    server:
      http_listen_port: 4040

    memberlist:
      bind_addr:
        - 0.0.0.0
      advertise_addr: ${POD_IP}
      abort_if_cluster_join_fails: false
      join_members:
        - pyroscope-memberlist.pyroscope.svc.cluster.local:7946

    ingester:
      lifecycler:
        interface_names: ["eth0"]
        ring:
          kvstore:
            store: memberlist
          replication_factor: 1

    distributor:
      ring:
        kvstore:
          store: memberlist
        instance_interface_names: ["eth0"]

    store_gateway:
      sharding_ring:
        kvstore:
          store: memberlist
        instance_interface_names: ["eth0"]

    storage:
      backend: filesystem
      filesystem:
        dir: /data/pyroscope

rbac:
  create: true

service:
  type: ClusterIP
  port: 4040

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

