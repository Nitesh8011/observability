global:

existingObjstoreSecret: opentelemetry-metrics-secrets

query:
  enabled: true
  replicaCount: 2
  pdb:
    create: true
    minAvailable: 1
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  stores:
    - thanos-receive:10901
    - thanos-storegateway:10901
  serviceMonitor:
    enabled: true
    namespace: opentelemetry
    labels:
      prometheus: grafana

queryFrontend:
  enabled: true
  replicaCount: 2
  pdb:
    create: true
    minAvailable: 1
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  cache:
    type: memcached
    config:
      addresses:
        - memcached:11211
      max_item_size: 5MiB
      max_get_multi_concurrency: 50
      max_get_multi_batch_size: 100
      timeout: 500ms
      ttl: 24h

storegateway:
  enabled: true
  replicaCount: 2
  pdb:
    create: true
    minAvailable: 1
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2,    memory: 4Gi }
  persistence:
    enabled: true
    storageClass: gp3-csi
    size: 20Gi
  extraVolumes:
    - name: objstore-config
      secret:
        secretName: opentelemetry-metrics-secrets
        items:
          - key: objstore.yml
            path: objstore.yml
  extraVolumeMounts:
    - name: objstore-config
      mountPath: /conf
      readOnly: true
  indexCache:
    type: memcached
    config:
      addresses:
        - memcached:11211
      max_item_size: 1MiB
      max_get_multi_concurrency: 50
      max_get_multi_batch_size: 100
      max_idle_conns: 100
      timeout: 500ms
  chunkCache:
    type: memcached
    config:
      addresses:
        - memcached:11211
      max_item_size: 5MiB
      max_get_multi_concurrency: 50
      max_get_multi_batch_size: 50
      max_idle_conns: 100
      timeout: 500ms

compactor:
  enabled: true
  resources:
    limits:
      cpu: 1
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 2Gi
  persistence:
    enabled: true
    storageClass: gp3-csi
    size: 50Gi
    accessModes: [ "ReadWriteOnce" ]
  extraVolumes:
    - name: objstore-config
      secret:
        secretName: opentelemetry-metrics-secrets
        items:
          - key: objstore.yml
            path: objstore.yml
  extraVolumeMounts:
    - name: objstore-config
      mountPath: /conf
      readOnly: true
  args:
    - compact
    - --log.level=info
    - --log.format=logfmt
    - --http-address=0.0.0.0:10902
    - --data-dir=/data
    - --objstore.config-file=/conf/objstore.yml
    - --consistency-delay=30m
    - --compact.concurrency=1
    - --wait
    - --retention.resolution-raw=30d
    - --retention.resolution-5m=60d
    - --retention.resolution-1h=90d

receive:
  enabled: true
  mode: standalone
  replicaCount: 3
  pdb:
    create: true
    minAvailable: 2
  resources:
    limits:
      cpu: 2
      memory: 4Gi
    requests:
      cpu: 1
      memory: 2Gi
  persistence:
    enabled: true
    storageClass: gp3-csi
    size: 50Gi
    accessModes: ["ReadWriteOnce"]
    mountPath: /data
  service:
    type: ClusterIP
    ports:
      grpc: 10901
      http: 10902
      remote-write: 19291
  extraVolumes:
    - name: objstore-config
      secret:
        secretName: opentelemetry-metrics-secrets
        items:
          - key: objstore.yml
            path: objstore.yml
  extraVolumeMounts:
    - name: objstore-config
      mountPath: /conf
      readOnly: true
    - name: data
      mountPath: /data
  args:
    - receive
    - --log.level=info
    - --log.format=logfmt
    - --grpc-address=0.0.0.0:10901
    - --http-address=0.0.0.0:10902
    - --remote-write.address=0.0.0.0:19291
    - --objstore.config-file=/conf/objstore.yml
    - --tsdb.path=/data
    - --tsdb.retention=2h
    - --label=receive="true"
    - --label=replica="$(POD_NAME)"
    - --receive.replication-factor=1
    - --receive.hashrings-algorithm=ketama
    - --receive.local-endpoint=$(POD_IP):10901
    - --receive.tenant-header=X-Prometheus-Remote-Write-0-Tenant-Id
    - --receive.default-tenant-id=default
    - --tsdb.allow-overlapping-blocks
    - --tsdb.no-lockfile
    - --tsdb.min-block-duration=2h
    - --tsdb.max-block-duration=2h
  extraEnvVars:
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
  securityContext:
    enabled: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    runAsNonRoot: true
    namespace: opentelemetry
    labels:
      prometheus: grafana
    interval: 30s
    scrapeTimeout: 10s

ruler:
  enabled: false

metrics:
  enabled: true

podSecurityContext:
  enabled: true
  fsGroup: 1001

securityContext:
  enabled: true
  runAsUser: 1001
  runAsGroup: 1001