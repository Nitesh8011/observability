apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  labels:
    app.kubernetes.io/component: opentelemetry
    app.kubernetes.io/instance: collector
  name: otel-gateway
  namespace: opentelemetry
spec:
  config:
    exporters:
      otlphttp/loki:
        compression: gzip
        endpoint: http://loki-gateway.loki/otlp
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_elapsed_time: 900s
          max_interval: 30s
        sending_queue:
          enabled: true
          num_consumers: 8
          queue_size: 50000
        timeout: 120s
      otlphttp/mimir-ms:
        compression: zstd
        endpoint: http://mimir-gateway.mimir-ms:8080/otlp
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_elapsed_time: 300s
          max_interval: 30s
        sending_queue:
          enabled: true
          num_consumers: 5
          queue_size: 10000
        tls:
          insecure: true
      otlphttp/tempo-ms:
        endpoint: http://tempo-gateway.tempo-ms
        compression: zstd
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_elapsed_time: 600s
          max_interval: 30s
        sending_queue:
          enabled: true
          num_consumers: 5
          queue_size: 5000
        timeout: 120s
    extensions:
      bearertokenauth/agents:
        token: ${env:OTEL_AUTH_TOKEN}
      health_check:
        endpoint: 0.0.0.0:13133
        path: /
    processors:
      batch/logs:
        send_batch_max_size: 2048
        send_batch_size: 1024
        timeout: 10s
      batch/metrics:
        send_batch_max_size: 512
        send_batch_size: 256
        timeout: 10s
      batch/traces:
        send_batch_max_size: 1024
        send_batch_size: 512
        timeout: 5s
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.node.name
        passthrough: true
      memory_limiter:
        check_interval: 2s
        limit_mib: 4096
        limit_percentage: 80
        spike_limit_percentage: 20
    receivers:
      otlp:
        protocols:
          grpc:
            auth:
              authenticator: bearertokenauth/agents
            endpoint: 0.0.0.0:4317
            tls:
              cert_file: /server-tls/tls.crt
              client_ca_file: /client-ca/ca.crt
              key_file: /server-tls/tls.key
          http:
            auth:
              authenticator: bearertokenauth/agents
            endpoint: 0.0.0.0:4318
            tls:
              cert_file: /server-tls/tls.crt
              client_ca_file: /client-ca/ca.crt
              key_file: /server-tls/tls.key
    service:
      extensions:
        - health_check
        - bearertokenauth/agents
      pipelines:
        logs:
          exporters:
            - otlphttp/loki
          processors:
            - memory_limiter
            - batch/logs
          receivers:
            - otlp
        metrics:
          exporters:
            - otlphttp/mimir-ms
          processors:
            - memory_limiter
            - k8sattributes
            - batch/metrics
          receivers:
            - otlp
        traces:
          exporters:
            - otlphttp/tempo-ms
          processors:
            - memory_limiter
            - batch/traces
          receivers:
            - otlp
      telemetry:
        logs:
          encoding: json
          level: info
        metrics:
          level: detailed
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
  configVersions: 3
  daemonSetUpdateStrategy: {}
  deploymentUpdateStrategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  env:
    - name: OTEL_AUTH_TOKEN
      valueFrom:
        secretKeyRef:
          key: OTEL_AUTH_TOKEN
          name: otel-gateway-token
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.149.0
  ingress:
    route: {}
  ipFamilyPolicy: SingleStack
  managementState: managed
  mode: deployment
  networkPolicy:
    enabled: true
  observability:
    metrics: {}
  podDnsConfig: {}
  podManagementPolicy: Parallel
  replicas: 5
  resources:
    limits:
      cpu: "2"
      memory: 12Gi
    requests:
      cpu: 100m
      memory: 2Gi
  securityContext:
    runAsGroup: 0
    runAsUser: 0
  serviceAccount: otel-gateway-collector
  targetAllocator:
    allocationStrategy: consistent-hashing
    collectorNotReadyGracePeriod: 30s
    collectorTargetReloadInterval: 30s
    filterStrategy: relabel-config
    observability:
      metrics: {}
    prometheusCR:
      evaluationInterval: 30s
      podMonitorNamespaceSelector: {}
      probeNamespaceSelector: {}
      scrapeConfigNamespaceSelector: {}
      scrapeInterval: 30s
      serviceMonitorNamespaceSelector: {}
    resources: {}
  upgradeStrategy: automatic
  volumeMounts:
    - mountPath: /server-tls
      name: server-tls
      readOnly: true
    - mountPath: /client-ca
      name: client-ca
      readOnly: true
  volumes:
    - name: server-tls
      secret:
        secretName: otel-gateway-tls
    - name: client-ca
      secret:
        secretName: otel-gateway-ca
---
# LoadBalancer Service — exposes gRPC port 4317 externally on port 443.
# The LB operates at Layer 4 (TCP) so TLS/mTLS is handled entirely
# by the collector — the LB is fully transparent.
#
# After applying, get the external IP:
#   kubectl get svc otel-gateway-external -n opentelemetry
# Then point your DNS:
#   otel-gateway.example.com → <EXTERNAL-IP>
#
# Cloud-specific annotations (uncomment the one that applies):
# apiVersion: v1
# kind: Service
# metadata:
#   name: otel-gateway-external
#   namespace: opentelemetry
#   annotations:
#     service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
#     service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
#     service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
# spec:
#   type: LoadBalancer
#   # Replace with the actual label the operator puts on gateway pods.
#   # Verify with: kubectl get pods -n opentelemetry --show-labels | grep otel-gateway
#   selector:
#     app.kubernetes.io/name: otel-gateway-collector
#   ports:
#     - name: otlp-grpc
#       port: 443          # what agents connect to
#       targetPort: 4317   # collector's gRPC listener
#       protocol: TCP