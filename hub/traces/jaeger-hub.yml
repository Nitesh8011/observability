---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: jaeger-otel
  labels:
    app.kubernetes.io/component: collector
    app.kubernetes.io/instance: opentelemetry
spec:
  config:
    exporters:
      jaeger_storage_exporter:
        trace_storage: es
    extensions:
      jaeger_query:
        grpc:
          endpoint: '0.0.0.0:16685'
        http:
          endpoint: '0.0.0.0:16686'
        storage:
          traces: es
      jaeger_storage:
        backends:
          es:
            elasticsearch:
              server_urls:
                - 'https://elastic:${env:ES_PASSWORD}@jaeger-es-http:9200'
              tls:
                ca_file: /es/certificates/ca.crt
              tags_as_fields:
                all_tags: false
                tags:
                  - namespace
                  - pod  
                  - app
                  - deployment
                  - deployment.environment
    processors:
      attributes/preserve:
        actions:
          - action: insert
            key: hub.processed
            value: "true"
      batch:
        send_batch_max_size: 2048
        send_batch_size: 1024
        timeout: 1s
      memory_limiter:
        check_interval: 1s
        limit_percentage: 85
        spike_limit_percentage: 25
    receivers:
      jaeger:
        protocols:
          grpc:
            endpoint: '0.0.0.0:14250'
          thrift_compact:
            endpoint: '0.0.0.0:6831'
          thrift_http:
            endpoint: '0.0.0.0:14268'
      otlp:
        protocols:
          grpc:
            endpoint: '0.0.0.0:4317'
          http:
            endpoint: '0.0.0.0:4318'
    service:
      extensions:
        - jaeger_storage
        - jaeger_query
      pipelines:
        traces:
          exporters:
            - jaeger_storage_exporter
          processors:
            - memory_limiter
            - attributes/preserve
            - batch
          receivers:
            - otlp
            - jaeger
      telemetry:
        logs:
          level: info
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
  mode: daemonset
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  env:
    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          key: elastic
          name: jaeger-es-elastic-user
  managementState: managed
  upgradeStrategy: automatic
  volumeMounts:
    - mountPath: /es/certificates
      name: es-certs
      readOnly: true
  volumes:
    - name: es-certs
      secret:
        secretName: jaeger-es-http-certs-public
  daemonSetUpdateStrategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  image: 'cr.jaegertracing.io/jaegertracing/jaeger:2.9.0'
  replicas: 1
  ipFamilyPolicy: SingleStack
  configVersions: 3
---