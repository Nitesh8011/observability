apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-ds
  labels:
    app.kubernetes.io/name: grafana
    grafana_datasource: prometheus
spec:
  allowCrossNamespaceImport: false
  datasource:
    access: proxy
    jsonData:
      timeInterval: 30s
    name: prometheus
    type: prometheus
    uid: prometheus
    url: 'http://thanos-query:9090'
  instanceSelector:
    matchLabels:
      grafana: datasource
  resyncPeriod: 10m