---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: metrics-otel
spec:
  mode: daemonset
  image: otel/opentelemetry-collector-contrib:0.132.0
  daemonSetUpdateStrategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  config:
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
        path: /
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      hostmetrics:
        collection_interval: 10s
        scrapers:
          cpu: {}
          memory: {}
          load: {}
          network: {}
          filesystem: {}
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 85
        spike_limit_percentage: 25
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.container.name
        passthrough: false
      resource:
        attributes:
          - action: upsert
            from_attribute: k8s.namespace.name
            key: namespace
          - action: upsert
            from_attribute: k8s.container.name
            key: app
          - action: upsert
            from_attribute: k8s.pod.name
            key: pod
          - key: k8s.namespace.name
            action: delete
          - key: k8s.pod.name
            action: delete
          - key: k8s.container.name
            action: delete
      batch:
        send_batch_max_size: 2048
        send_batch_size: 1024
        timeout: 1s
    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers:  [otlp, hostmetrics]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters:  [prometheus]
      telemetry:
        logs:
          level: info
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
---