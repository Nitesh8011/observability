apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
spec:
  config:
    exporters:
      prometheus:
        endpoint: '0.0.0.0:8889'
      zipkin: 
        compression: gzip
        endpoint: 'http://jaeger-collector.opentelemetry.svc.cluster.local:9411/api/v2/spans'
        tls:
          insecure: true
    processors:
      batch:
        send_batch_max_size: 2048
        send_batch_size: 1024
        timeout: 1s
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
        passthrough: false
      resource:
        attributes:
          - action: upsert
            from_attribute: k8s.deployment.name
            key: service.name
    receivers:
      hostmetrics:
        collection_interval: 10s
        scrapers:
          cpu: {}
          load: {}
          memory: {}
          network: {}
      jaeger:
        protocols:
          grpc:
            endpoint: '0.0.0.0:14250'
          thrift_compact:
            endpoint: '0.0.0.0:6831'
          thrift_http:
            endpoint: '0.0.0.0:14268'
      otlp:
        protocols:
          grpc:
            endpoint: '0.0.0.0:4317'
          http:
            endpoint: '0.0.0.0:4318'
    service:
      pipelines:
        metrics:
          exporters:
            - prometheus
          processors:
            - k8sattributes
            - resource
            - batch
          receivers:
            - otlp
            - hostmetrics
        traces:
          exporters:
            - zipkin
          processors:
            - resource
            - batch
          receivers:
            - otlp
            - jaeger
      telemetry:
        logs:
          level: info
        metrics:
          address: '0.0.0.0:8888'
  mode: daemonset
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  managementState: managed
  upgradeStrategy: automatic
  imagePullPolicy: IfNotPresent
  daemonSetUpdateStrategy:
    type: RollingUpdate
  targetAllocator:
    allocationStrategy: consistent-hashing
    collectorNotReadyGracePeriod: 30s
    filterStrategy: relabel-config
    observability:
    prometheusCR:
      scrapeInterval: 30s
  image: 'otel/opentelemetry-collector-contrib:0.91.0'
  replicas: 1
  ipFamilyPolicy: SingleStack
  configVersions: 3