---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: jaeger-otel
spec:
  mode: daemonset
  image: cr.jaegertracing.io/jaegertracing/jaeger:2.9.0
  daemonSetUpdateStrategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  env:
    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jaeger-es-elastic-user
          key: password
  volumeMounts:
    - name: es-certs
      mountPath: /es/certificates
      readOnly: true
  volumes:
    - name: es-certs
      secret:
        secretName: jaeger-es-http-certs-public
  config:
    receivers:
      jaeger:
        protocols:
          grpc:           { endpoint: "0.0.0.0:14250" }
          thrift_compact: { endpoint: "0.0.0.0:6831" }
          thrift_http:    { endpoint: "0.0.0.0:14268" }
      otlp:
        protocols:
          grpc: { endpoint: "0.0.0.0:4317" }
          http: { endpoint: "0.0.0.0:4318" }
    processors:
      batch:
        send_batch_max_size: 2048
        send_batch_size: 1024
        timeout: 1s
      memory_limiter:
        check_interval: 1s
        limit_percentage: 85
        spike_limit_percentage: 25
    exporters:
      jaeger_storage_exporter:
        trace_storage: es
    extensions:
      jaeger_storage:
        backends:
          es:
            elasticsearch:
              server_urls:
                - "https://elastic:${env:ES_PASSWORD}@jaeger-es-http:9200"
              tls:
                ca_file: /es/certificates/ca.crt
      jaeger_query:
        grpc:
          endpoint: '0.0.0.0:16685'
        http:
          endpoint: '0.0.0.0:16686'
        storage:
          traces: es
    service:
      extensions: [jaeger_storage,jaeger_query]
      pipelines:
        traces:
          receivers: [otlp,jaeger]
          processors: [batch]
          exporters: [jaeger_storage_exporter]
      telemetry:
        logs:
          level: info
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
---