apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-view-cr
rules:
  - apiGroups: [""]
    resources: ["pods","namespaces", "nodes"]
    verbs: ["get","list","watch"]
  - resources: ["apps"]
    apiGroups: ["replicasets","deployments"]
    verbs: ["get","list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-view-crb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-view-cr
subjects:
  - kind: ServiceAccount
    name: metrics-otel-collector
    namespace: opentelemetry