# Thanos Helm Chart Values (bitnami/thanos)
# Complete setup with Memcached caching for optimal performance

global:

existingObjstoreSecret: prometheus-thanos-s3-secret

# Thanos Query
query:
  enabled: true
  replicaCount: 2
  
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  stores:
    - thanos-storegateway:10901
    - prometheus-operated:10901

  # ServiceMonitor for Prometheus scraping
  serviceMonitor:
    enabled: true
    namespace: "opentelemetry"
    labels:
      prometheus: grafana

# Thanos Query Frontend - Query caching and splitting with Memcached
queryFrontend:
  enabled: true
  replicaCount: 2
  
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  # Use multi-line extraFlags as documented by Bitnami
  extraFlags:
    - --query-range.split-interval=1h
    - |
      --query-range.response-cache-config=
      type: MEMCACHED
      config:
        addresses:
          - memcached:11211
        timeout: 500ms
        max_idle_connections: 100
        max_async_concurrency: 10
        max_async_buffer_size: 10000
        max_get_multi_concurrency: 100
        max_get_multi_batch_size: 0
        dns_provider_update_interval: 10s
        expiration: 360h
  
  serviceMonitor:
    enabled: true
    namespace: "opentelemetry"
    labels:
      prometheus: grafana

# Thanos Store Gateway - Access to object storage with enhanced caching
storegateway:
  enabled: true
  replicaCount: 1
  
  resources:
    limits:
      cpu: 2
      memory: 4Gi
    requests:
      cpu: 1
      memory: 2Gi
  
  persistence:
    enabled: true
    storageClass: "crunchy-dev"
    size: 149Gi
  
  # Configure both index cache and bucket cache using multi-line extraFlags
  extraFlags:
    - --index-cache-size=1GB
    - |
      --index-cache.config=
      type: MEMCACHED
      config:
        addresses:
          - memcached:11211
        timeout: 500ms
        max_idle_connections: 100
        max_async_concurrency: 10
        max_async_buffer_size: 10000
        max_get_multi_concurrency: 100
        max_get_multi_batch_size: 0
        dns_provider_update_interval: 10s
        expiration: 360h
    - |
      --store.caching-bucket.config=
      type: MEMCACHED
      config:
        addresses:
          - memcached:11211
        timeout: 500ms
        max_idle_connections: 100
        max_async_concurrency: 10
        max_async_buffer_size: 10000
        max_get_multi_concurrency: 100
        max_get_multi_batch_size: 0
        dns_provider_update_interval: 10s
        expiration: 360h

  livenessProbe:
    httpGet:
      path: /-/healthy
      port: 10902
    initialDelaySeconds: 30
    periodSeconds: 60
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /-/ready
      port: 10902
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  
  serviceMonitor:
    enabled: true
    namespace: "opentelemetry"
    labels:
      prometheus: grafana

# Thanos Compactor - Block compaction and downsampling
compactor:
  enabled: true
  resources:
    limits:
      cpu: 1
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 2Gi
  
  persistence:
    enabled: true
    storageClass: "crunchy-dev" 
    size: 149Gi

  args:
    - compact
    - --log.level=info
    - --log.format=logfmt
    - --http-address=0.0.0.0:10902
    - --data-dir=/data
    - --objstore.config-file=/conf/objstore.yml
    - --consistency-delay=30m
    - --compact.concurrency=1
    - --wait
    - --retention.resolution-raw=30d
    - --retention.resolution-5m=60d
    - --retention.resolution-1h=90d

  livenessProbe:
    httpGet:
      path: /-/healthy
      port: 10902
    initialDelaySeconds: 30
    periodSeconds: 60
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /-/ready
      port: 10902
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

ruler:
  enabled: false

receive:
  enabled: false

metrics:
  enabled: true

securityContext:
  enabled: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

podSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001