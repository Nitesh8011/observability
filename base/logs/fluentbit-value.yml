kind: DaemonSet

serviceAccount:
  create: true
  name: fluent-bit

rbac:
  create: true

securityContext:
  runAsUser: 0
  runAsGroup: 0
  privileged: true

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

service:
  type: ClusterIP

resources:
  limits:
    memory: 256Mi
    cpu: 200m
  requests:
    memory: 128Mi
    cpu: 100m

extraVolumes:
  - name: varlibcontainers
    hostPath:
      path: /var/lib/containers
      type: Directory
  - name: fluentbit-storage
    emptyDir: {}
  - name: run-fluentbit
    emptyDir: {}

extraVolumeMounts:
  - name: varlibcontainers
    mountPath: /var/lib/containers
    readOnly: true
  - name: fluentbit-storage
    mountPath: /var/fluent-bit/storage
  - name: run-fluentbit
    mountPath: /run/fluent-bit

config:
  service: |
    [SERVICE]
        Flush                   5
        Daemon                  Off
        Log_Level               info
        Parsers_File            parsers.conf
        storage.path            /var/fluent-bit/storage
        storage.sync            normal
        storage.checkpoint_file flb_checkpoint.db
        HTTP_Server             On
        HTTP_Listen             0.0.0.0
        HTTP_Port               2020

  inputs: |
    [INPUT]
        Name               tail
        Tag                kube.*
        Path               /var/log/containers/*dev-ops*.log,/var/log/containers/*dev*.log
        Parser             cri
        DB                 /var/fluent-bit/storage/flb_kube.db
        Mem_Buf_Limit      5MB
        Skip_Long_Lines    On
        Refresh_Interval   5

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Labels              On

    [FILTER]
        Name                grep
        Match               kube.*
        Regex               $kubernetes['namespace_name'] ^(?:dev-ops|dev)$

    # Parse JSON inside 'message' field to extract trace_id, span_id, etc.
    [FILTER]
        Name                parser
        Match               kube.*
        Parser              json
        Key_Name            message
        Reserve_Data        On

    [FILTER]
        Name                modify
        Match               kube.*
        Copy                trace_id trace_id
        Copy                span_id span_id
        Copy                logger_name logger_name
        Copy                thread_name thread_name

    [FILTER]
        Name                nest
        Match               kube.*
        Operation           lift
        Nested_under        kubernetes
        Add_prefix          k8s_

    [FILTER]
        Name                modify
        Match               kube.*
        Copy                k8s_namespace_name namespace
        Copy                k8s_pod_name pod
        Copy                k8s_container_name app

    # Removed 'Remove message' to keep full log message

    [FILTER]
        Name                modify
        Match               kube.*
        Remove              k8s_pod_name
        Remove              k8s_namespace_name
        Remove              k8s_pod_id
        Remove              k8s_host
        Remove              k8s_pod_ip
        Remove              k8s_container_name
        Remove              k8s_docker_id
        Remove              k8s_container_hash
        Remove              k8s_container_image
        Remove              k8s_labels

    [FILTER]
        Name                modify
        Match               kube.*
        Remove              host
        Remove              pod_ip
        Remove              container_name
        Remove              docker_id
        Remove              container_hash
        Remove              container_image
        Remove              instrumentation.opentelemetry.io/inject-java
        Remove              instrumentation.opentelemetry.io/otel-instrumentation-jvm-metrics-enabled
        Remove              instrumentation.opentelemetry.io/otel-logs-exporter
        Remove              instrumentation.opentelemetry.io/otel-metrics-exporter
        Remove              k8s.v1.cni.cncf.io/network-status
        Remove              openshift.io/scc
        Remove              openshift.openshift.io/restartedAt
        Remove              kubectl.kubernetes.io/restartedAt
        # Remove              log
        # Remove              level
        # Remove              logger
        # Remove              thread
        # Remove              job
        # Remove              stream
        # Remove              logtag
        # Remove              time

    [FILTER]
        Name                modify
        Match               kube.*
        Rename              log_message message

    [FILTER]
        Name                record_modifier
        Match               kube.*
        Whitelist_key       message
        Whitelist_key       namespace
        Whitelist_key       pod
        Whitelist_key       app
        Whitelist_key       trace_id
        Whitelist_key       span_id
        Whitelist_key       logger_name
        Whitelist_key       thread_name

  outputs: |
    [OUTPUT]
        Name        loki
        Match       kube.*
        Host        loki-loki-distributed-distributor.opentelemetry.svc.cluster.local
        Port        3100
        URI         /loki/api/v1/push
        Buffer_Size 102400
        Labels      namespace=$namespace,pod=$pod,app=$app,trace_id=$trace_id,span_id=$span_id,logger_name=$logger_name,thread_name=$thread_name
        Auto_Kubernetes_Labels Off
        Drop_Single_Key On
        Compress    snappy
        Tenant_ID   onprem

parsers: |
  [PARSER]
      Name        cri
      Format      json
      Time_Key    time
      Time_Format %Y-%m-%dT%H:%M:%S.%L%z
      Time_Keep   On
