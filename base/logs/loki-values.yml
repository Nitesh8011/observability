loki:
  enabled: true
  config: |
    auth_enabled: false

    common:
      path_prefix: /var/loki
      compactor_grpc_address: {{ .Release.Name }}-compactor.{{ .Release.Namespace }}.svc.cluster.local:9095

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095

    distributor:
      ring:
        kvstore:
          store: memberlist

    ingester:
      lifecycler:
        ring:
          kvstore:
            store: memberlist
          replication_factor: 1
      chunk_idle_period: 5m
      chunk_target_size: 1048576
      max_chunk_age: 1h  # Force chunk flushing for better querying
      wal:
        enabled: true
        dir: /var/loki/wal

    querier:
      query_ingesters_within: 2h
      query_store_only: false
      # Add parallelism for better performance
      max_concurrent: 16
      query_timeout: 300s

    frontend_worker:
      frontend_address: {{ .Release.Name }}-loki-distributed-query-frontend-headless:9095
      # Increase parallelism
      parallelism: 10

    compactor:
      working_directory: /var/loki/compactor
      shared_store: s3
      retention_enabled: true

    frontend:
      log_queries_longer_than: 5s
      # Add query result caching
      max_outstanding_per_tenant: 2048
      compress_responses: true

    schema_config:
      configs:
        - from: 2020-10-15
          store: boltdb-shipper
          object_store: s3
          schema: v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /var/loki/index
        shared_store: s3
        # Add index caching
        cache_ttl: 24h
        cache_location: /var/loki/index_cache

      aws:
        bucketnames: ${BUCKETNAME}
        endpoint: https://s3.${REGION}.amazonaws.com
        region: ${REGION}
        access_key_id: ${ACCESS_KEY_ID}
        secret_access_key: ${ACCESS_KEY_SECRET}
        s3forcepathstyle: false

    # Enhanced chunk store config with proper caching
    chunk_store_config:
      chunk_cache_config:
        memcached_client:
          addresses: memcached:11211
          timeout: 500ms
          max_idle_conns: 100
          update_interval: 1m

    query_range:
      align_queries_with_step: true
      max_retries: 5
      # Enhanced results caching
      results_cache:
        cache:
          memcached_client:
            addresses: memcached:11211
            timeout: 500ms
            max_idle_conns: 100
            update_interval: 1m

    memberlist:
      join_members:
        - {{ .Release.Name }}-loki-distributed-memberlist.{{ .Release.Namespace }}.svc.cluster.local:7946

    limits_config:
      retention_period: 2160h
      # Optimize for label queries
      max_query_series: 10000
      max_query_parallelism: 32
      max_streams_per_user: 0  # Unlimited streams
      max_line_size: 256000
      # Add cardinality limits
      max_label_name_length: 1024
      max_label_value_length: 4096
      max_label_names_per_series: 30
      # Split queries for better performance
      split_queries_by_interval: 30m
      # Query timeout
      query_timeout: 300s

  extraEnvFrom:
    - secretRef:
        name: grafana-loki-s3-secret

distributor:
  replicas: 2
  maxUnavailable: 1
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:  # Add resource requests
      cpu: 250m
      memory: 512Mi
  extraArgs:
    - -config.expand-env=true
    - -target=distributor
  extraEnvFrom:
    - secretRef:
        name: grafana-loki-s3-secret

ingester:
  replicas: 1
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:  # Add resource requests
      cpu: 500m
      memory: 1Gi
  extraArgs:
    - -config.expand-env=true
    - -target=ingester
  extraEnvFrom:
    - secretRef:
        name: grafana-loki-s3-secret
  persistence:
    enabled: true
    inMemory: false
    claims:
      - name: data
        size: 20Gi
        storageClass: gp3-csi
        accessModes:
          - ReadWriteOnce

querier:
  replicas: 2  # Increase replicas for better performance
  maxUnavailable: 1
  resources:
    limits:
      cpu: 1      # Increase CPU for label queries
      memory: 2Gi # Increase memory for caching
    requests:
      cpu: 500m
      memory: 1Gi
  extraArgs:
    - -config.expand-env=true
    - -target=querier
  extraEnvFrom:
    - secretRef:
        name: grafana-loki-s3-secret

queryFrontend:
  replicas: 2
  maxUnavailable: 1
  jaegerQuery:
    enabled: false
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  extraArgs:
    - -config.expand-env=true
    - -target=query-frontend
  extraEnvFrom:
    - secretRef:
        name: grafana-loki-s3-secret

compactor:
  enabled: true
  schedule: "@every 30m"
  retention_period: 90d
  retention_delete_delay: 2h
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  extraArgs:
    - -config.expand-env=true
    - -target=compactor
  extraEnvFrom:
    - secretRef:
        name: grafana-loki-s3-secret
  persistence:
    enabled: true
    inMemory: false
    claims:
      - name: data
        size: 20Gi
        storageClass: gp3-csi
        accessModes:
          - ReadWriteOnce

gateway:
  enabled: true
  nginx:
    resolver: "172.30.0.10 valid=10s"
    resolver_timeout: 5s