loki:
  enabled: true
  config: |
    auth_enabled: false

    common:
      path_prefix: /var/loki
      compactor_grpc_address: {{ .Release.Name }}-compactor.{{ .Release.Namespace }}.svc.cluster.local:9095

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095

    distributor:
      ring:
        kvstore:
          store: memberlist

    ingester:
      lifecycler:
        ring:
          kvstore:
            store: memberlist
          replication_factor: 1  # Changed from 3 to 1 since you have 1 ingester
      chunk_idle_period: 5m
      chunk_target_size: 1048576
      wal:
        enabled: true
        dir: /var/loki/wal

    querier:
      query_ingesters_within: 2h
      query_store_only: false

    frontend_worker:
      frontend_address: {{ .Release.Name }}-loki-distributed-query-frontend-headless:9095

    query_range:
      align_queries_with_step: true
      max_retries: 5

    compactor:
      working_directory: /var/loki/compactor
      shared_store: s3
      retention_enabled: true

    frontend:
      log_queries_longer_than: 5s

    schema_config:
      configs:
        - from: 2020-10-15
          store: boltdb-shipper
          object_store: s3
          schema: v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /var/loki/index
        shared_store: s3

      aws:
        bucketnames: ${BUCKETNAME}
        endpoint: https://s3.${REGION}.amazonaws.com
        region: ${REGION}
        access_key_id: ${ACCESS_KEY_ID}
        secret_access_key: ${ACCESS_KEY_SECRET}
        s3forcepathstyle: false

    memberlist:
      join_members:
        - {{ .Release.Name }}-loki-distributed-memberlist.{{ .Release.Namespace }}.svc.cluster.local:7946

    limits_config:
      retention_period: 720h

  extraEnvFrom:
    - secretRef:
        name: grafana-loki-s3-secret

distributor:
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
  extraArgs:
    - -config.expand-env=true
    - -target=distributor
  extraEnvFrom:
    - secretRef:
        name: grafana-loki-s3-secret

ingester:
  replicas: 1
  resources:
    limits:
      cpu: 1
      memory: 2Gi
  extraArgs:
    - -config.expand-env=true
    - -target=ingester
  extraEnvFrom:
    - secretRef:
        name: grafana-loki-s3-secret
  persistence:
    enabled: true
    inMemory: false         # optional, defaults to false
    claims:
      - name: data          # this becomes the PVC name: loki-loki-distributed-ingester-<ordinal>-data
        size: 20Gi
        storageClass: gp3-csi
        accessModes:
          - ReadWriteOnce

querier:
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
  extraArgs:
    - -config.expand-env=true
    - -target=querier
  extraEnvFrom:
    - secretRef:
        name: grafana-loki-s3-secret

queryFrontend:
  replicas: 1
  jaegerQuery:
    enabled: false
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
  extraArgs:
    - -config.expand-env=true
    - -target=query-frontend
  extraEnvFrom:
    - secretRef:
        name: grafana-loki-s3-secret

compactor:
  enabled: true
  schedule: "@every 1h"
  retention:
    raw: 720h
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
  extraArgs:
    - -config.expand-env=true
    - -target=compactor
  extraEnvFrom:
    - secretRef:
        name: grafana-loki-s3-secret
  persistence:
    enabled: true
    inMemory: false         # optional, defaults to false
    claims:
      - name: data          # this becomes the PVC name: loki-loki-distributed-ingester-<ordinal>-data
        size: 20Gi
        storageClass: gp3-csi
        accessModes:
          - ReadWriteOnce

gateway:
  enabled: true
  nginx:
    resolver: "172.30.0.10 valid=10s"
    resolver_timeout: 5s