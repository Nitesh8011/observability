# =============================================================================
# values.yaml — grafana/alloy (FULL — logs + metrics + traces + profiling)
# Cluster : ONPREM / namespace: dev
#
# Signal routing:
#   logs     ──OTLP/zstd──► otel-gateway.prospecta.com:443 ──► Loki
#   metrics  ──OTLP/zstd──► otel-gateway.prospecta.com:443 ──► Mimir
#   traces   ──OTLP/zstd──► otel-gateway.prospecta.com:443 ──► Tempo
#   profiles ──pprof/gzip─► pyroscope-hub.prospecta.com    ──► Pyroscope
#
# Install:
#   helm upgrade --install alloy-agent grafana/alloy \
#     --namespace alloy --create-namespace \
#     --values alloy-dev-full-values.yaml \
#     --atomic --timeout 5m
# =============================================================================

image:
  repository: grafana/alloy
  tag: v1.8.0
  pullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# Controller
# -----------------------------------------------------------------------------
controller:
  type: daemonset
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  terminationGracePeriodSeconds: 60
  hostPID: true   # required for pyroscope.java
  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
  tolerations:
    - operator: Exists
      effect: NoSchedule

# -----------------------------------------------------------------------------
# Alloy container
# -----------------------------------------------------------------------------
alloy:
  stabilityLevel: "generally-available"
  enableReporting: false

  extraArgs:
    - --cluster.enabled=false

  # Privileged required for pyroscope.java (async-profiler injection)
  # Mirrors original OTel agent: runAsUser: 0, seLinuxOptions.type: spc_t
  securityContext:
    privileged: true
    runAsUser: 0
    runAsGroup: 0
    seLinuxOptions:
      type: spc_t

  resources:
    limits:
      cpu: "1"
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 512Mi

  extraEnv:
    - name: OTEL_AUTH_TOKEN
      valueFrom:
        secretKeyRef:
          name: otel-agent-token
          key: OTEL_AUTH_TOKEN
    - name: GOGC
      value: "70"
    - name: GOMEMLIMIT
      value: "3700MiB"
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName

  mounts:
    varlog: true   # needed for filelog receiver
    extra:
      - name: client-tls
        mountPath: /client-tls
        readOnly: true
      - name: client-ca
        mountPath: /client-ca
        readOnly: true

  configMap:
    create: true
    content: |-

      logging {
        level  = "info"
        format = "logfmt"
      }

      // =======================================================================
      // LOGS
      // filelog → memory_limiter → k8sattributes → resource → filter → batch
      //        → otelcol.exporter.otlp.gateway (zstd) → otel-gateway → Loki
      // =======================================================================

      otelcol.receiver.filelog "dev_logs" {
        include = [
          "/var/log/pods/dev_*/*/*.log",
          "/var/log/pods/fuse-spark-dev_*/*/*.log",
        ]
        include_file_name = false
        include_file_path = true
        start_at          = "end"
        operators = [
          { type = "container"  id = "container-parser" },
        ]
        output {
          logs = [otelcol.processor.memory_limiter.default.input]
        }
      }


      // =======================================================================
      // METRICS
      // otlp + hostmetrics + k8s_cluster + prometheusOperator
      //   → memory_limiter → k8sattributes → resource → filter → transform
      //   → batch → gateway (zstd) → Mimir
      //
      // Pulsar metrics have a separate lightweight pipeline → same gateway
      // =======================================================================

      otelcol.receiver.otlp "default" {
        grpc { endpoint = "0.0.0.0:4317" }
        http { endpoint = "0.0.0.0:4318" }
        output {
          metrics = [otelcol.processor.memory_limiter.default.input]
          logs    = [otelcol.processor.memory_limiter.default.input]
          traces  = [otelcol.processor.memory_limiter.default.input]
        }
      }

      otelcol.receiver.hostmetrics "default" {
        collection_interval = "30s"
        root_path           = "/"
        scrapers {
          cpu {}  disk {}  filesystem {}  load {}  memory {}  network {}  process {}
        }
        output {
          metrics = [otelcol.processor.memory_limiter.default.input]
        }
      }

      otelcol.receiver.k8s_cluster "default" {
        collection_interval       = "30s"
        node_conditions_to_report = ["Ready", "MemoryPressure", "DiskPressure"]
        auth_type                 = "serviceAccount"
        output {
          metrics = [otelcol.processor.memory_limiter.default.input]
        }
      }

      // Prometheus Operator CRD discovery (replaces targetallocator)
      prometheus.operator.servicemonitors "grafana" {
        selector        { match_labels = { "prometheus" = "grafana" } }
        scrape_interval = "1m"
        forward_to      = [otelcol.receiver.prometheus.operator.receiver]
      }
      prometheus.operator.podmonitors "grafana" {
        selector        { match_labels = { "prometheus" = "grafana" } }
        scrape_interval = "1m"
        forward_to      = [otelcol.receiver.prometheus.operator.receiver]
      }
      otelcol.receiver.prometheus "operator" {
        output {
          metrics = [otelcol.processor.memory_limiter.default.input]
        }
      }

      // Alloy self-metrics
      prometheus.scrape "alloy_self" {
        targets    = [{"__address__" = "localhost:12345"}]
        job_name   = "alloy-self"
        forward_to = [otelcol.receiver.prometheus.operator.receiver]
      }

      // Pulsar per-node scraping — broker:8080, bookkeeper:8000, zookeeper:8000
      discovery.kubernetes "pulsar_broker_pods" {
        role = "pod"
        namespaces { names = ["dev"] }
        selectors { role = "pod"  field = "spec.nodeName=" + env("K8S_NODE_NAME") }
      }
      discovery.relabel "pulsar_broker" {
        targets = discovery.kubernetes.pulsar_broker_pods.targets
        rule { source_labels = ["__meta_kubernetes_pod_label_component"]  regex = "broker"  action = "keep" }
        rule { source_labels = ["__address__"]  regex = "([^:]+)(?::\\d+)?"  replacement = "$1:8080"  target_label = "__address__" }
        rule { source_labels = ["__meta_kubernetes_pod_name"]       target_label = "pod" }
        rule { source_labels = ["__meta_kubernetes_namespace"]      target_label = "namespace" }
        rule { source_labels = ["__meta_kubernetes_pod_node_name"]  target_label = "node" }
        rule { replacement = "pulsar-broker"                        target_label = "job" }
      }
      discovery.kubernetes "pulsar_bookkeeper_pods" {
        role = "pod"
        namespaces { names = ["dev"] }
        selectors { role = "pod"  field = "spec.nodeName=" + env("K8S_NODE_NAME") }
      }
      discovery.relabel "pulsar_bookkeeper" {
        targets = discovery.kubernetes.pulsar_bookkeeper_pods.targets
        rule { source_labels = ["__meta_kubernetes_pod_label_component"]  regex = "bookkeeper"  action = "keep" }
        rule { source_labels = ["__address__"]  regex = "([^:]+)(?::\\d+)?"  replacement = "$1:8000"  target_label = "__address__" }
        rule { source_labels = ["__meta_kubernetes_pod_name"]       target_label = "pod" }
        rule { source_labels = ["__meta_kubernetes_namespace"]      target_label = "namespace" }
        rule { source_labels = ["__meta_kubernetes_pod_node_name"]  target_label = "node" }
        rule { replacement = "pulsar-bookkeeper"                    target_label = "job" }
      }
      discovery.kubernetes "pulsar_zookeeper_pods" {
        role = "pod"
        namespaces { names = ["dev"] }
        selectors { role = "pod"  field = "spec.nodeName=" + env("K8S_NODE_NAME") }
      }
      discovery.relabel "pulsar_zookeeper" {
        targets = discovery.kubernetes.pulsar_zookeeper_pods.targets
        rule { source_labels = ["__meta_kubernetes_pod_label_component"]  regex = "zookeeper"  action = "keep" }
        rule { source_labels = ["__address__"]  regex = "([^:]+)(?::\\d+)?"  replacement = "$1:8000"  target_label = "__address__" }
        rule { source_labels = ["__meta_kubernetes_pod_name"]       target_label = "pod" }
        rule { source_labels = ["__meta_kubernetes_namespace"]      target_label = "namespace" }
        rule { source_labels = ["__meta_kubernetes_pod_node_name"]  target_label = "node" }
        rule { replacement = "pulsar-zookeeper"                     target_label = "job" }
      }
      prometheus.scrape "pulsar_broker" {
        targets = discovery.relabel.pulsar_broker.output
        job_name = "pulsar-broker"  scrape_interval = "30s"  scrape_timeout = "10s"
        forward_to = [otelcol.receiver.prometheus.pulsar.receiver]
      }
      prometheus.scrape "pulsar_bookkeeper" {
        targets = discovery.relabel.pulsar_bookkeeper.output
        job_name = "pulsar-bookkeeper"  scrape_interval = "30s"  scrape_timeout = "10s"
        forward_to = [otelcol.receiver.prometheus.pulsar.receiver]
      }
      prometheus.scrape "pulsar_zookeeper" {
        targets = discovery.relabel.pulsar_zookeeper.output
        job_name = "pulsar-zookeeper"  scrape_interval = "30s"  scrape_timeout = "10s"
        forward_to = [otelcol.receiver.prometheus.pulsar.receiver]
      }
      otelcol.receiver.prometheus "pulsar" {
        output {
          metrics = [otelcol.processor.memory_limiter.pulsar.input]
        }
      }


      // =======================================================================
      // TRACES
      // beyla.ebpf → batch/traces → gateway (zstd) → Tempo
      // Also receives traces from otelcol.receiver.otlp above
      // =======================================================================

      beyla.ebpf "dev" {
        attributes {
          kubernetes {
            cluster_name = "ONPREM"
            enable       = "true"
          }
        }
        discovery {
          instrument         { kubernetes { namespace = "dev" } }
          exclude_instrument { kubernetes { namespace = "kube-system" } }
          exclude_instrument { kubernetes { namespace = "opentelemetry" } }
          exclude_instrument { kubernetes { namespace = "alloy" } }
        }
        traces {
          instrumentations = ["http", "grpc", "sql"]
        }
        ebpf {
          enable_context_propagation = true
        }
        output {
          traces = [otelcol.processor.batch.traces.input]
        }
      }


      // =======================================================================
      // PROFILING — pyroscope.java (async-profiler)
      // Profiles all Java processes in dev namespace on this node.
      // Goes DIRECTLY to Pyroscope — not through otel-gateway.
      // =======================================================================

      discovery.process "all" {
        refresh_interval = "60s"
        discover_config {
          exe         = true
          commandline = true
          container_id = true
        }
      }

      discovery.relabel "java_only" {
        targets = discovery.process.all.targets
        rule {
          source_labels = ["__meta_process_exe"]
          regex         = ".*/java$"
          action        = "keep"
        }
      }

      discovery.relabel "java_dev_enriched" {
        targets = discovery.relabel.java_only.output
        rule {
          source_labels = ["__meta_process_container_id"]
          target_label  = "__container_id_short__"
        }
        // service_name from jar filename
        rule {
          source_labels = ["__meta_process_commandline"]
          regex         = ".*/([-\\w]+?)(?:-\\d[\\d.]*)?(?:-SNAPSHOT)?\\.jar.*"
          replacement   = "$1"
          target_label  = "service_name"
        }
        rule { replacement = "ONPREM"  target_label = "cluster" }
        rule { replacement = "dev"     target_label = "namespace" }
      }

      pyroscope.java "dev" {
        targets    = discovery.relabel.java_dev_enriched.output
        forward_to = [pyroscope.write.backend.receiver]
        profiling_config {
          interval    = "60s"
          cpu         = true
          sample_rate = 100
          alloc       = "512k"
          lock        = "1ms"
        }
      }

      pyroscope.write "backend" {
        endpoint {
          url = "https://pyroscope-hub.prospecta.com"
        }
        external_labels = {
          "cluster" = "ONPREM",
          "env"     = "dev",
        }
      }


      // =======================================================================
      // PROCESSORS — main pipeline (logs + metrics + traces)
      // =======================================================================

      otelcol.processor.memory_limiter "default" {
        check_interval  = "1s"
        limit_mib       = 3700
        spike_limit_mib = 200
        output {
          metrics = [otelcol.processor.k8sattributes.default.input]
          logs    = [otelcol.processor.k8sattributes.default.input]
          traces  = [otelcol.processor.k8sattributes.default.input]
        }
      }

      otelcol.processor.k8sattributes "default" {
        auth_type   = "serviceAccount"
        passthrough = false
        extract {
          metadata = [
            "k8s.namespace.name", "k8s.deployment.name", "k8s.statefulset.name",
            "k8s.pod.name", "k8s.cronjob.name", "k8s.job.name",
          ]
        }
        pod_association { source { from = "resource_attribute"  name = "k8s.pod.ip" } }
        pod_association { source { from = "resource_attribute"  name = "k8s.pod.uid" } }
        pod_association { source { from = "connection" } }
        output {
          metrics = [otelcol.processor.resource.insert_cluster.input]
          logs    = [otelcol.processor.resource.insert_cluster.input]
          traces  = [otelcol.processor.resource.insert_cluster.input]
        }
      }

      otelcol.processor.resource "insert_cluster" {
        attributes { action = "insert"  key = "cluster.name"  value = "ONPREM" }
        output {
          metrics = [otelcol.processor.resource.upsert_node.input]
          logs    = [otelcol.processor.resource.upsert_node.input]
          traces  = [otelcol.processor.resource.upsert_node.input]
        }
      }

      otelcol.processor.resource "upsert_node" {
        attributes { action = "upsert"  key = "k8s.node.name"  value = env("K8S_NODE_NAME") }
        output {
          metrics = [otelcol.processor.resource.cleanup.input]
          logs    = [otelcol.processor.resource.cleanup.input]
          traces  = [otelcol.processor.resource.cleanup.input]
        }
      }

      otelcol.processor.resource "cleanup" {
        attributes { action = "delete"  key = "k8s.replicaset.uid"          }
        attributes { action = "delete"  key = "k8s.pod.uid"                 }
        attributes { action = "delete"  key = "telemetry.sdk.name"          }
        attributes { action = "delete"  key = "telemetry.sdk.language"      }
        attributes { action = "delete"  key = "telemetry.sdk.version"       }
        attributes { action = "delete"  key = "telemetry.auto.version"      }
        attributes { action = "delete"  key = "telemetry.distro.name"       }
        attributes { action = "delete"  key = "telemetry.distro.version"    }
        attributes { action = "delete"  key = "process.pid"                 }
        attributes { action = "delete"  key = "process.executable.path"     }
        attributes { action = "delete"  key = "process.command_line"        }
        attributes { action = "delete"  key = "process.command_args"        }
        attributes { action = "delete"  key = "process.runtime.name"        }
        attributes { action = "delete"  key = "process.runtime.version"     }
        attributes { action = "delete"  key = "process.runtime.description" }
        attributes { action = "delete"  key = "host.name"                   }
        attributes { action = "delete"  key = "host.arch"                   }
        attributes { action = "delete"  key = "os.type"                     }
        attributes { action = "delete"  key = "os.description"              }
        attributes { action = "delete"  key = "container.id"                }
        attributes { action = "delete"  key = "k8s.pod.ip"                  }
        attributes { action = "delete"  key = "k8s.node.name"               }
        attributes { action = "delete"  key = "k8s.container.name"          }
        attributes { action = "delete"  key = "k8s.replicaset.name"         }
        attributes { action = "delete"  key = "k8s.daemonset.name"          }
        attributes { action = "delete"  key = "service.instance.id"         }
        attributes { action = "delete"  key = "service.version"             }
        attributes { action = "delete"  key = "severity_number"             }
        attributes { action = "delete"  key = "severity_text"               }
        output {
          metrics = [otelcol.processor.filter.drop_metrics.input]
          logs    = [otelcol.processor.filter.drop_long_logs.input]
          traces  = [otelcol.processor.batch.traces.input]
        }
      }

      otelcol.processor.filter "drop_metrics" {
        error_mode = "ignore"
        metrics {
          exclude {
            match_type = "regexp"
            metric_names = [
              ".*_bucket", ".*_sum", ".*_count", "target_info",
              "otel.*", "otlp_.*", "scrape_.*", "go_.*", "process_.*",
              "rpc_.*", "system_.*", "exported_.*",
              "queueSize_ratio", "processedLogs_total", "processedSpans_total",
            ]
          }
        }
        output {
          metrics = [otelcol.processor.transform.add_cluster_label.input]
        }
      }

      otelcol.processor.filter "drop_long_logs" {
        error_mode = "ignore"
        logs { log_record = ["body != nil and Len(body) > 500"] }
        output {
          logs = [otelcol.processor.batch.logs.input]
        }
      }

      otelcol.processor.transform "add_cluster_label" {
        metric_statements {
          context    = "datapoint"
          statements = [`set(attributes["cluster"], resource.attributes["cluster.name"])`]
        }
        output {
          metrics = [otelcol.processor.batch.metrics.input]
        }
      }

      // Separate batch per signal — different tuning per pipeline
      otelcol.processor.batch "logs" {
        send_batch_size     = 512
        send_batch_max_size = 1024
        timeout             = "5s"
        output { logs = [otelcol.exporter.otlp.gateway.input] }
      }

      otelcol.processor.batch "metrics" {
        send_batch_size     = 512
        send_batch_max_size = 1024
        timeout             = "5s"
        output { metrics = [otelcol.exporter.otlp.gateway.input] }
      }

      otelcol.processor.batch "traces" {
        send_batch_size     = 512
        send_batch_max_size = 1024
        timeout             = "5s"
        output { traces = [otelcol.exporter.otlp.gateway.input] }
      }


      // =======================================================================
      // PROCESSORS — Pulsar pipeline (separate, lighter 256 MiB budget)
      // =======================================================================

      otelcol.processor.memory_limiter "pulsar" {
        check_interval = "5s"  limit_mib = 256  spike_limit_mib = 64
        output { metrics = [otelcol.processor.resource.pulsar_node.input] }
      }
      otelcol.processor.resource "pulsar_node" {
        attributes { action = "upsert"  key = "k8s.node.name"  value = env("K8S_NODE_NAME") }
        output { metrics = [otelcol.processor.filter.pulsar_noisy.input] }
      }
      otelcol.processor.filter "pulsar_noisy" {
        error_mode = "ignore"
        metrics {
          exclude {
            match_type   = "regexp"
            metric_names = ["pulsar_consumer_.*", "pulsar_producer_.*"]
          }
        }
        output { metrics = [otelcol.processor.batch.pulsar.input] }
      }
      otelcol.processor.batch "pulsar" {
        send_batch_size = 512  send_batch_max_size = 1024  timeout = "5s"
        output { metrics = [otelcol.exporter.otlp.gateway.input] }
      }


      // =======================================================================
      // EXPORTER — single OTLP exporter → otel-gateway
      //
      // compression = "zstd"
      //   Logs    → gateway logs pipeline     → Loki
      //   Metrics → gateway metrics pipeline  → Mimir
      //   Traces  → gateway traces pipeline   → Tempo
      //
      // Gateway is OTel Collector Contrib 0.149.0 — zstd fully supported.
      // =======================================================================
      otelcol.exporter.otlp "gateway" {
        client {
          endpoint    = "otel-gateway.prospecta.com:443"
          compression = "zstd"

          headers = {
            "authorization" = "Bearer " + env("OTEL_AUTH_TOKEN"),
          }

          tls {
            insecure  = false
            ca_file   = "/client-ca/ca.crt"
            cert_file = "/client-tls/tls.crt"
            key_file  = "/client-tls/tls.key"
          }

          sending_queue {
            enabled       = true
            num_consumers = 8
            queue_size    = 5000
          }

          retry_on_failure {
            enabled          = true
            initial_interval = "5s"
            max_interval     = "30s"
            max_elapsed_time = "300s"
          }

          timeout = "30s"
        }
      }

# -----------------------------------------------------------------------------
# configReloader disabled — causes duplicate metrics panic in Alloy v1.8
# Use helm upgrade for config changes instead
# -----------------------------------------------------------------------------
configReloader:
  enabled: false

# -----------------------------------------------------------------------------
# Service — exposes OTLP ports for instrumented apps to push to
# -----------------------------------------------------------------------------
service:
  enabled: true
  type: ClusterIP
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

# -----------------------------------------------------------------------------
# ServiceMonitor — Prometheus scrapes Alloy self-metrics
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  additionalLabels:
    prometheus: grafana
  interval: 60s

# -----------------------------------------------------------------------------
# RBAC
# -----------------------------------------------------------------------------
rbac:
  create: true

extraClusterRoleRules:
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*"]
    verbs: ["get"]

# -----------------------------------------------------------------------------
# ServiceAccount — on-prem, no IRSA
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}

# OpenShift: let SCC admission controller manage pod security
podSecurityContext: {}

# -----------------------------------------------------------------------------
# mTLS volumes — client cert + CA for gateway auth
# -----------------------------------------------------------------------------
extraVolumes:
  - name: client-tls
    secret:
      secretName: otel-agent-tls
  - name: client-ca
    secret:
      secretName: otel-agent-ca

crds:
  create: false

# =============================================================================
# COMPRESSION SUMMARY
#
#   Signal    Component                  Compression   Destination
#   ────────────────────────────────────────────────────────────────
#   logs      otelcol.exporter.otlp      zstd          otel-gateway → Loki
#   metrics   otelcol.exporter.otlp      zstd          otel-gateway → Mimir
#   traces    otelcol.exporter.otlp      zstd          otel-gateway → Tempo
#   profiles  pyroscope.write            gzip (fixed)  Pyroscope direct
#
# OPENSHIFT SCC (run once before helm install):
#   oc adm policy add-scc-to-user privileged -z alloy-agent -n alloy
#
# JVM FLAG RECOMMENDATION (add to every Java deployment in dev ns):
#   env:
#     - name: JAVA_TOOL_OPTIONS
#       value: "-XX:+UnlockDiagnosticVMOptions -XX:+DebugNonSafepoints"
#
# PORT CHANGES FROM ORIGINAL OTEL AGENT:
#   Health  :13133  →  :12345/-/healthy
#   Metrics :8888   →  :12345/metrics
#   Alloy UI (new)     :12345
# =============================================================================