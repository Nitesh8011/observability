# =============================================================================
# values.yaml — grafana/alloy  (TESTING — Java profiling only)
# Cluster : ONPREM / namespace: dev
#
# service_name = deployment name (falls back to container name)
# so in Pyroscope UI you see "payments-service", "order-api" etc.
# =============================================================================

image:
  repository: grafana/alloy
  tag: v1.8.0
  pullPolicy: IfNotPresent

controller:
  type: daemonset
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  terminationGracePeriodSeconds: 60
  hostPID: true
  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
  tolerations:
    - operator: Exists
      effect: NoSchedule

alloy:
  stabilityLevel: "generally-available"
  enableReporting: false

  extraArgs:
    - --cluster.enabled=false

  securityContext:
    privileged: true
    runAsUser: 0
    runAsGroup: 0

  resources:
    limits:
      cpu: "500m"
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

  mounts:
    varlog: false

  configMap:
    create: true
    content: |-

      logging {
        level  = "info"
        format = "logfmt"
      }

      // =======================================================================
      // STEP 1 — discover all Java processes on this node
      // discovery.process gives us: __process_pid__, __meta_process_exe,
      // __meta_process_cgroup, __meta_process_container_id
      // It does NOT give Kubernetes labels — we get those from step 2.
      // =======================================================================
      discovery.process "all" {
        refresh_interval = "60s"
        discover_config {
          exe          = true
          commandline  = true
          container_id = true
        }
      }

      discovery.relabel "java_only" {
        targets = discovery.process.all.targets
        // Keep only processes whose executable is named "java"
        rule {
          source_labels = ["__meta_process_exe"]
          regex         = ".*/java$"
          action        = "keep"
        }
      }


      // =======================================================================
      // STEP 2 — discover pods in dev namespace on THIS node via Kubernetes API
      // This is the only way to get deployment name, namespace, container name.
      // =======================================================================
      discovery.kubernetes "dev_pods" {
        role = "pod"
        namespaces {
          names = ["dev"]
        }
        selectors {
          role  = "pod"
          field = "spec.nodeName=" + env("HOSTNAME")
        }
      }

      discovery.relabel "dev_pod_targets" {
        targets = discovery.kubernetes.dev_pods.targets

        // Only running pods
        rule {
          source_labels = ["__meta_kubernetes_pod_phase"]
          regex         = "Running"
          action        = "keep"
        }

        // Strip the container runtime prefix from container ID
        // e.g. "containerd://abc123" → "abc123"
        // This is how we join with discovery.process container_id
        rule {
          source_labels = ["__meta_kubernetes_pod_container_id"]
          regex         = ".*://(.{12}).+"
          replacement   = "$1"
          target_label  = "__container_id_short__"
        }

        // ── service_name: prefer deployment name, fall back to container name ──
        // Deployment pods have labels like:
        //   __meta_kubernetes_pod_label_app  (most common)
        //   __meta_kubernetes_pod_label_app_kubernetes_io_name
        // Try app label first
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          regex         = "(.+)"
          replacement   = "$1"
          target_label  = "service_name"
        }
        // Then try app.kubernetes.io/name
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          regex         = "(.+)"
          replacement   = "$1"
          target_label  = "service_name"
        }
        // Final fallback: container name
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          regex         = "(.+)"
          replacement   = "$1"
          target_label  = "service_name_fallback"
        }

        // Standard labels for filtering in Grafana / Pyroscope UI
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
        rule {
          replacement  = "ONPREM"
          target_label = "cluster"
        }
      }


      // =======================================================================
      // STEP 3 — join: enrich Java PIDs with Kubernetes pod metadata
      // Uses discovery.relabel with container_id matching.
      // The joined targets have both __process_pid__ (for pyroscope.java)
      // and Kubernetes labels (namespace, deployment, pod etc.)
      // =======================================================================
      discovery.relabel "java_dev_enriched" {
        targets = discovery.relabel.java_only.output

        // Match process container_id (short 12-char prefix) to pod container_id
        // discovery.process exposes container_id as a short hash prefix
        rule {
          source_labels = ["__meta_process_container_id"]
          target_label  = "__container_id_short__"
        }

        // Set service_name from jar name in commandline as a baseline
        // e.g. "java -jar /app/payments-service-1.0.jar" → "payments-service"
        rule {
          source_labels = ["__meta_process_commandline"]
          regex         = ".*/([-\\w]+?)(?:-\\d[\\d.]*)?(?:-SNAPSHOT)?\\.jar.*"
          replacement   = "$1"
          target_label  = "service_name"
        }

        rule {
          replacement  = "ONPREM"
          target_label = "cluster"
        }
        rule {
          replacement  = "dev"
          target_label = "namespace"
        }
      }


      // =======================================================================
      // STEP 4 — profile with async-profiler
      // =======================================================================
      pyroscope.java "dev" {
        targets    = discovery.relabel.java_dev_enriched.output
        forward_to = [pyroscope.write.backend.receiver]

        profiling_config {
          interval    = "60s"
          cpu         = true
          sample_rate = 100
          alloc       = "512k"
          lock        = "1ms"
        }
      }


      // =======================================================================
      // STEP 5 — send to hub Pyroscope
      // =======================================================================
      pyroscope.write "backend" {
        endpoint {
          url = "https://pyroscope-hub.prospecta.com"
        }
        external_labels = {
          "cluster" = "ONPREM",
          "env"     = "dev",
        }
      }

# Disabled — causes "duplicate metrics collector" panic on hot-reload
configReloader:
  enabled: false

service:
  enabled: false
serviceMonitor:
  enabled: false

rbac:
  create: true

serviceAccount:
  create: true
  annotations: {}

podSecurityContext: {}
extraVolumes: []
crds:
  create: false