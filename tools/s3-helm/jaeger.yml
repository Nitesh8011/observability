jaeger:
  enabled: true
  replicas: 3

  extraEnv:
    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jaeger-es-elastic-user
          key: elastic

# ✅ REMOVE extraSecretMounts completely

# ------------------------------------------------------------------------------
# ✅ MAIN CONFIG (Jaeger v2 uses THIS)
# ------------------------------------------------------------------------------
userconfig:

  extensions:
    # ✅ REQUIRED (fix liveness probe)
    healthcheckv2:
      use_v2: true
      http:
        endpoint: "0.0.0.0:13133"

    jaeger_storage:
      backends:
        es:
          elasticsearch:
            server_urls:
              - "https://jaeger-es-http:9200"
            auth:
              basic:
                username: elastic
                password: "${env:ES_PASSWORD}"
            tls:
              insecure: true   # ✅ TEMP: skip cert issue
            version: 9

    jaeger_query:
      storage:
        traces: es
      http:
        endpoint: "0.0.0.0:16686"
      grpc:
        endpoint: "0.0.0.0:16685"

  exporters:
    jaeger_storage_exporter:
      trace_storage: es

  processors:
    memory_limiter:
      check_interval: 1s
      limit_percentage: 85
      spike_limit_percentage: 25

    batch:
      send_batch_size: 256
      timeout: 10s

  receivers:
    otlp:
      protocols:
        grpc:
        http:

    jaeger:
      protocols:
        grpc:
        thrift_http:
        thrift_compact:

  service:
    extensions:
      - healthcheckv2   # ✅ IMPORTANT
      - jaeger_storage
      - jaeger_query

    pipelines:
      traces:
        receivers: [otlp, jaeger]
        processors: [memory_limiter, batch]
        exporters: [jaeger_storage_exporter]

# ------------------------------------------------------------------------------
# ✅ STORAGE (ONLY FOR CLEANER JOBS)
# ------------------------------------------------------------------------------
storage:
  type: elasticsearch
  elasticsearch:
    tls:
      enabled: false   # ✅ not needed here
    url: "https://elastic:$(ES_PASSWORD)@jaeger-es-http:9200"

# ------------------------------------------------------------------------------
# OPTIONAL CLEANER
# ------------------------------------------------------------------------------
esIndexCleaner:
  enabled: false