apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: jaeger
  namespace: jaeger
  labels:
    app.kubernetes.io/component: traces
    app.kubernetes.io/instance: opentelemetry-hub
    app.kubernetes.io/name: jaeger
spec:
  auth: {}
  http:
    service:
      metadata: {}
      spec: {}
    tls:
      certificate: {}
  monitoring:
    logs: {}
    metrics: {}
  nodeSets:
    - config:
        indices.memory.index_buffer_size: 30%
        indices.memory.min_index_buffer_size: 96mb
        node.roles:
          - master
          - data
          - ingest
        node.store.allow_mmap: false
      count: 3
      name: jaeger
      podTemplate:
        metadata: {}
        spec:
          containers:
            - env:
                - name: ES_JAVA_OPTS
                  value: '-Xms6g -Xmx6g -Des.allow_insecure_settings=true'
                # - name: AWS_ROLE_ARN
                #   value: 'arn:aws:iam::597088041925:role/elastic-snapshot-jaeger-role'
                # - name: AWS_WEB_IDENTITY_TOKEN_FILE
                #   value: /usr/share/elasticsearch/config/repository-s3/aws-web-identity-token-file
              name: elasticsearch
              resources:
                limits:
                  cpu: 2
                  memory: 8Gi
                requests:
                  cpu: 100m
                  memory: 4Gi
              # volumeMounts:
              #   - mountPath: /usr/share/elasticsearch/config/repository-s3
              #     name: aws-iam-token
          # serviceAccountName: jaeger-elastic-snapshot-sa
          # volumes:
          #   - name: aws-iam-token
          #     projected:
          #       sources:
          #         - serviceAccountToken:
          #             audience: sts.amazonaws.com
          #             expirationSeconds: 86400
          #             path: aws-web-identity-token-file
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 50Gi
            storageClassName: gp3-csi
  remoteClusterServer: {}
  transport:
    service:
      metadata: {}
      spec: {}
    tls:
      certificate: {}
      certificateAuthorities: {}
  updateStrategy:
    changeBudget: {}
  version: 9.3.0
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: jaeger
  namespace: jaeger
  labels:
    app.kubernetes.io/component: traces
    app.kubernetes.io/name: jaeger
spec:
  config:
    exporters:
      jaeger_storage_exporter:
        trace_storage: es
    extensions:
      jaeger_query:
        grpc:
          endpoint: '0.0.0.0:16685'
        http:
          endpoint: '0.0.0.0:16686'
        storage:
          traces: es
      jaeger_storage:
        backends:
          es:
            elasticsearch:
              server_urls:
                - 'https://elastic:${env:ES_PASSWORD}@jaeger-es-http:9200'
              tls:
                ca_file: /es/certificates/ca.crt
    processors:
      attributes/preserve:
        actions:
          - action: insert
            key: hub.processed
            value: 'true'
      batch:
        send_batch_max_size: 512
        send_batch_size: 256
        timeout: 5s
      memory_limiter:
        check_interval: 1s
        limit_percentage: 85
        spike_limit_percentage: 25
    receivers:
      jaeger:
        protocols:
          grpc:
            endpoint: '0.0.0.0:14250'
          thrift_compact:
            endpoint: '0.0.0.0:6831'
          thrift_http:
            endpoint: '0.0.0.0:14268'
      otlp:
        protocols:
          grpc:
            endpoint: '0.0.0.0:4317'
          http:
            endpoint: '0.0.0.0:4318'
    service:
      extensions:
        - jaeger_storage
        - jaeger_query
      pipelines:
        traces:
          exporters:
            - jaeger_storage_exporter
          processors:
            - memory_limiter
            - attributes/preserve
            - batch
          receivers:
            - otlp
            - jaeger
      telemetry:
        logs:
          level: info
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
  mode: deployment
  resources:
    limits:
      cpu: '3'
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 1Gi
  env:
    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          key: elastic
          name: jaeger-es-elastic-user
    - name: ES_MAX_NUM_SPANS
      value: '10000'
    - name: ES_TIMEOUT
      value: 300s
  managementState: managed
  upgradeStrategy: automatic
  volumeMounts:
    - mountPath: /es/certificates
      name: es-certs
      readOnly: true
  volumes:
    - name: es-certs
      secret:
        secretName: jaeger-es-http-certs-public
  daemonSetUpdateStrategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  targetAllocator:
    allocationStrategy: consistent-hashing
    collectorNotReadyGracePeriod: 30s
    collectorTargetReloadInterval: 30s
    filterStrategy: relabel-config
    observability:
      metrics: {}
    prometheusCR:
      scrapeInterval: 30s
    resources: {}
  image: 'jaegertracing/jaeger:latest'
  replicas: 3
  ipFamilyPolicy: SingleStack
  configVersions: 4