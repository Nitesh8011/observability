backend:
  persistence:
    accessModes:
    - ReadWriteOnce
    enableStatefulSetAutoDeletePVC: true
    size: 10Gi
    storageClass: gp3-csi
    volumeClaimsEnabled: true
  replicas: 3
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 256Mi
chunksCache:
  args:
  - -I 256m
  batchSize: 32
  defaultValidity: 1h
  enabled: true
  parallelism: 10
  timeout: 10000ms
  writebackBuffer: 1000000
  writebackParallelism: 4
  writebackSizeLimit: 1GB
deploymentMode: SimpleScalable
gateway:
  enabled: true
  nginx:
    config:
      proxy-body-buffer-size: 64m
      proxy-buffer-size: 64k
      proxy-buffers: 16 64k
      proxy-connect-timeout: "300"
      proxy-read-timeout: "300"
      proxy-request-buffering: "off"
      proxy-send-timeout: "300"
    resolver: 172.30.0.10 valid=10s
  nginxConfig:
    serverSnippet: |
      # Allow large request bodies for high-volume log ingestion
      client_max_body_size 512M;
      client_body_timeout 300;
      client_header_timeout 300;
      proxy_buffering off;
      proxy_request_buffering off;
      keepalive_timeout 1850;
      send_timeout 300;
      large_client_header_buffers 8 64k;
      # OOM FIX: Reduced client_body_buffer_size 256m → 64m — 256m was held per connection in memory
      client_body_buffer_size 64m;
      client_body_in_file_only off;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
  replicas: 2
  resources:
    limits:
      cpu: 2
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  service:
    port: 80
    type: ClusterIP
loki:
  auth_enabled: false
  commonConfig:
    path_prefix: /var/loki
    replication_factor: 3
    ring:
      kvstore:
        store: memberlist
  compactor:
    compaction_interval: 10m
    delete_request_store: s3
    retention_delete_delay: 2h
    retention_delete_worker_count: 50
    retention_enabled: true
    working_directory: /var/loki/compactor
  distributor:
    ring:
      kvstore:
        store: memberlist
  frontend:
    compress_responses: true
    log_queries_longer_than: 30s
    max_outstanding_per_tenant: 512
  frontend_worker:
    grpc_client_config:
      max_recv_msg_size: 536870912
      max_send_msg_size: 536870912
  image:
    repository: grafana/loki
    tag: 3.5.7
  ingester:
    chunk_idle_period: 1m
    chunk_retain_period: 15s
    chunk_target_size: 1572864
    lifecycler:
      final_sleep: 0s
      join_after: 0s
      ring:
        replication_factor: 3
    max_chunk_age: 5m
    wal:
      checkpoint_duration: 5m
      dir: /var/loki/wal
      enabled: true
      flush_on_shutdown: true
      replay_memory_ceiling: 8GB
  limits_config:
    allow_structured_metadata: true
    cardinality_limit: 100000
    ingestion_burst_size_mb: 256
    ingestion_rate_mb: 128
    max_cache_freshness_per_query: 10m
    max_concurrent_tail_requests: 50
    max_entries_limit_per_query: 2000000
    max_global_streams_per_user: 500000
    max_line_size: 256KB
    max_line_size_truncate: false
    max_query_capacity: 536870912
    max_query_length: 168h
    max_query_lookback: 0
    max_query_parallelism: 24
    max_query_series: 5000
    max_streams_matchers_per_query: 10000
    max_streams_per_user: 100000
    max_structured_metadata_entries_count: 128
    max_structured_metadata_size: 512KB
    min_sharding_lookback: 0s
    otlp_config:
      resource_attributes:
        ignore_defaults: false
    per_stream_rate_limit: 32MB
    per_stream_rate_limit_burst: 64MB
    query_timeout: 300s
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    retention_period: 15d
    shard_streams:
      desired_rate: 5242880
      enabled: true
      logging_enabled: true
    split_queries_by_interval: 24h
    unordered_writes: true
  livenessProbe:
    failureThreshold: 300
    httpGet:
      path: /ready
      port: http-metrics
    initialDelaySeconds: 120
    periodSeconds: 15
    timeoutSeconds: 10
  pattern_ingester:
    enabled: true
  querier:
    engine:
      max_look_back_period: 0
    max_concurrent: 16
    query_ingesters_within: 1h
  query_range:
    align_queries_with_step: true
    cache_results: true
    parallelise_shardable_queries: true
    results_cache:
      cache:
        embedded_cache:
          enabled: true
          max_size_mb: 1024
  query_scheduler:
    max_outstanding_requests_per_tenant: 512
  readinessProbe:
    failureThreshold: 6
    httpGet:
      path: /ready
      port: http-metrics
    initialDelaySeconds: 90
    periodSeconds: 15
    successThreshold: 1
    timeoutSeconds: 10
  resources:
    limits:
      cpu: 4
      memory: 12Gi
    requests:
      cpu: 100m
      memory: 256Mi
  schemaConfig:
    configs:
    - from: "2024-04-01"
      index:
        period: 24h
        prefix: loki_index_
      object_store: s3
      schema: v13
      store: tsdb
  server:
    grpc_listen_port: 9095
    grpc_server_keepalive_time: 30s
    grpc_server_keepalive_timeout: 10s
    grpc_server_max_recv_msg_size: 536870912
    grpc_server_max_send_msg_size: 536870912
    http_listen_port: 3100
    http_server_idle_timeout: 1850s
    http_server_read_timeout: 300s
    http_server_write_timeout: 300s
  serviceAccount:
    create: true
    name: loki
  storage:
    bucketNames:
      admin: otel-logs-597088041925-ap-southeast-2-an
      chunks: otel-logs-597088041925-ap-southeast-2-an
      ruler: otel-logs-597088041925-ap-southeast-2-an
    s3:
      http_config:
        idle_conn_timeout: 90s
        insecure_skip_verify: false
        response_header_timeout: 0s
      region: ap-southeast-2
      s3ForcePathStyle: false
    type: s3
  storage_config:
    hedging:
      at: 500ms
      max_per_second: 20
      up_to: 2
    tsdb_shipper:
      active_index_directory: /var/loki/tsdb-index
      cache_location: /var/loki/tsdb-cache
      cache_ttl: 24h
      resync_interval: 5m
lokiCanary:
  enabled: true
memcached:
  enabled: true
  extraArgs:
  - -I 512m
  - -m 4096
  replicas: 3
  resources:
    limits:
      cpu: 1
      memory: 5Gi
    requests:
      cpu: 100m
      memory: 2Gi
minio:
  enabled: false
monitoring:
  dashboards:
    enabled: false
  rules:
    enabled: false
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  serviceMonitor:
    enabled: false
read:
  affinity: {}
  extraEnv:
  - name: GOMEMLIMIT
    value: 16GiB
  horizontalPodAutoscaler:
    enabled: false
    maxReplicas: 6
    metrics:
    - resource:
        name: cpu
        target:
          averageUtilization: 70
          type: Utilization
      type: Resource
    - resource:
        name: memory
        target:
          averageUtilization: 75
          type: Utilization
      type: Resource
    minReplicas: 4
  podAntiAffinity: none
  replicas: 4
  resources:
    limits:
      memory: 24Gi
    requests:
      cpu: 100m
      memory: 8Gi
  terminationGracePeriodSeconds: 120
  topologySpreadConstraints: []
resultsCache:
  args:
  - -I 512m
  defaultValidity: 24h
  enabled: true
  timeout: 1000ms
  writebackBuffer: 1000000
  writebackParallelism: 2
  writebackSizeLimit: 1GB
write:
  extraEnv:
  - name: GOMEMLIMIT
    value: 28GiB
  - name: GOGC
    value: "100"
  persistence:
    accessModes:
    - ReadWriteOnce
    enableStatefulSetAutoDeletePVC: true
    size: 30Gi
    storageClass: gp3-csi
    volumeClaimsEnabled: true
  replicas: 4
  resources:
    limits:
      memory: 34Gi
    requests:
      memory: 24Gi
  terminationGracePeriodSeconds: 600

# helm upgrade --install loki grafana-community/loki -n loki -f tools/loki-logs.yml