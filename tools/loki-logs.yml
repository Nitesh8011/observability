backend:
  replicas: 3
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    volumeClaimsEnabled: true
    accessModes:
      - ReadWriteOnce
    enableStatefulSetAutoDeletePVC: true
    size: 10Gi
    storageClass: gp3-csi

chunksCache:
  args:
    - -I 256m
  # Increased batchSize from 8 → 32 to reduce S3 round trips
  batchSize: 32
  defaultValidity: 1h
  enabled: true
  parallelism: 10
  # Increased timeout from 3000ms → 10000ms to tolerate S3 latency spikes
  timeout: 10000ms
  writebackBuffer: 1000000
  writebackParallelism: 4
  writebackSizeLimit: 1GB

deploymentMode: SimpleScalable

gateway:
  enabled: true
  nginx:
    config:
      # OOM FIX: Reduced proxy-body-buffer-size 256m → 64m to lower per-connection memory held in gateway
      proxy-body-buffer-size: 64m
      proxy-buffer-size: 64k
      proxy-buffers: 16 64k
      proxy-connect-timeout: "300"
      proxy-read-timeout: "300"
      proxy-request-buffering: "off"
      proxy-send-timeout: "300"
    resolver: 172.30.0.10 valid=10s
  nginxConfig:
    serverSnippet: |
      # Allow large request bodies for high-volume log ingestion
      client_max_body_size 512M;
      client_body_timeout 300;
      client_header_timeout 300;
      proxy_buffering off;
      proxy_request_buffering off;
      keepalive_timeout 1850;
      send_timeout 300;
      large_client_header_buffers 8 64k;
      # OOM FIX: Reduced client_body_buffer_size 256m → 64m — 256m was held per connection in memory
      client_body_buffer_size 64m;
      client_body_in_file_only off;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
  replicas: 2
  resources:
    limits:
      cpu: 2
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  service:
    port: 80
    type: ClusterIP

loki:
  auth_enabled: false
  commonConfig:
    path_prefix: /var/loki
    replication_factor: 3
    ring:
      kvstore:
        store: memberlist

  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    compaction_interval: 10m
    # compaction_interval: 20m
    delete_request_store: s3
    retention_delete_delay: 2h
    retention_delete_worker_count: 50
    # retention_enabled: true
    # working_directory: /var/loki/compactor

  distributor:
    ring:
      kvstore:
        store: memberlist

  frontend:
    compress_responses: true
    log_queries_longer_than: 30s
    max_outstanding_per_tenant: 512

  frontend_worker:
    grpc_client_config:
      max_recv_msg_size: 536870912
      max_send_msg_size: 536870912

  image:
    repository: grafana/loki
    tag: 3.5.7

  ingester:

    lifecycler:
      ring:
        replication_factor: 3
      final_sleep: 0s
      join_after: 0s

    chunk_idle_period: 2m    # WAL FIX: Reduced 5m → 2m — idle chunks were sitting in WAL too long before flush
    max_chunk_age: 15m       # WAL FIX: Reduced 30m → 15m — caps how long any chunk stays in WAL before forced flush
    chunk_retain_period: 15s # WAL FIX: Reduced 30s → 15s — shorter retain means WAL segments are freed sooner

    chunk_target_size: 1572864   # ~1.5MB
    # max_transfer_retries: 0

  limits_config:
    ingestion_rate_mb: 128    # WAL FIX: Raised from 20 — low rate was causing ingestion backpressure which stalls WAL flushing
    ingestion_burst_size_mb: 256  # WAL FIX: Raised from 40 — burst was too low, causing constant throttling that backs up WAL

    max_streams_per_user: 100000
    max_global_streams_per_user: 500000

    max_line_size: 256KB
    reject_old_samples: true
    reject_old_samples_max_age: 168h

    retention_period: 15d   # ⚡ keep Loki fast (use S3 lifecycle for 90d)
      # replay_memory_ceiling: 12GB  # Increased from 8GB (you have 60Gi memory limit)
    allow_structured_metadata: true
    cardinality_limit: 100000
    # OOM FIX: Reduced ingestion_burst_size_mb 512 → 64 — this is the primary OOM driver.
    # A 512MB burst × 3x replication = up to 1.5GB sudden spike per tenant per write pod.
    # 64MB is generous for any real workload and prevents runaway burst allocation.
    # ingestion_burst_size_mb: 64
    # OOM FIX: Reduced ingestion_rate_mb 256 → 128 — sustained rate paired with burst reduction.
    # Keeps ingesters from being flooded back-to-back after burst headroom resets.
    # ingestion_rate_mb: 128
    max_cache_freshness_per_query: 10m
    max_concurrent_tail_requests: 50
    max_entries_limit_per_query: 2000000
    # max_line_size: 32MB
    max_line_size_truncate: false
    max_query_capacity: 536870912
    max_query_length: 168h
    max_query_lookback: 0
    max_query_parallelism: 32
    max_query_series: 5000
    max_streams_matchers_per_query: 10000
    max_structured_metadata_entries_count: 128
    max_structured_metadata_size: 512KB
    min_sharding_lookback: 0s
    otlp_config:
      resource_attributes:
        ignore_defaults: false
    # OOM FIX: Reduced per_stream_rate_limit 64MB → 32MB and burst 128MB → 64MB.
    # Across high-cardinality label sets, cumulative burst reservations across streams
    # add up to significant memory. 32MB/64MB is still very high per individual stream.
    per_stream_rate_limit: 32MB
    per_stream_rate_limit_burst: 64MB
    query_timeout: 300s
    # reject_old_samples: true
    # reject_old_samples_max_age: 336h
    # retention_period: 2160h
    shard_streams:
      desired_rate: 5242880
      enabled: true
      logging_enabled: true
    # Reduced from 1d → 6h: finer splits give more parallelism across read pods
    split_queries_by_interval: 6h
    unordered_writes: true

  livenessProbe:
    failureThreshold: 6
    httpGet:
      path: /ready
      port: http-metrics
    initialDelaySeconds: 120
    periodSeconds: 15
    timeoutSeconds: 10

  pattern_ingester:
    enabled: true

  querier:
    engine:
      max_look_back_period: 0
    max_concurrent: 32
    query_ingesters_within: 1h

  query_range:
    align_queries_with_step: true
    cache_results: true
    parallelise_shardable_queries: true
    results_cache:
      cache:
        embedded_cache:
          enabled: true
          # Increased from 512MB → 1024MB for better cache hit rate on repeated queries
          max_size_mb: 1024

  query_scheduler:
    max_outstanding_requests_per_tenant: 512

  readinessProbe:
    failureThreshold: 6
    httpGet:
      path: /ready
      port: http-metrics
    initialDelaySeconds: 90
    periodSeconds: 15
    successThreshold: 1
    timeoutSeconds: 10

  resources:
    limits:
      cpu: 4
      memory: 12Gi
    requests:
      cpu: 100m
      memory: 256Mi

  schemaConfig:
    configs:
      - from: "2024-04-01"
        index:
          period: 24h
          prefix: loki_index_
        object_store: s3
        schema: v13
        store: tsdb

  server:
    grpc_listen_port: 9095
    grpc_server_keepalive_time: 30s
    grpc_server_keepalive_timeout: 10s
    grpc_server_max_recv_msg_size: 536870912
    grpc_server_max_send_msg_size: 536870912
    http_listen_port: 3100
    http_server_idle_timeout: 1850s
    http_server_read_timeout: 300s
    http_server_write_timeout: 300s

  serviceAccount:
    # annotations:
    #   eks.amazonaws.com/role-arn: arn:aws:iam::597088041925:role/opentelemetry-logs-roles
    create: true
    name: loki

  storage:
    bucketNames:
      admin: otel-logs-597088041925-ap-southeast-2-an
      chunks: otel-logs-597088041925-ap-southeast-2-an
      ruler: otel-logs-597088041925-ap-southeast-2-an
    s3:
      http_config:
        idle_conn_timeout: 90s
        insecure_skip_verify: false
        response_header_timeout: 0s
      region: ap-southeast-2
      s3ForcePathStyle: false
    type: s3

  storage_config:
    hedging:
      # Increased from 250ms → 500ms — reduces duplicate S3 requests under normal load
      at: 500ms
      max_per_second: 20
      # Reduced from 3 → 2 — less aggressive hedging, fewer wasted S3 requests
      up_to: 2
    tsdb_shipper:
      active_index_directory: /var/loki/tsdb-index
      cache_location: /var/loki/tsdb-cache
      cache_ttl: 24h
      resync_interval: 5m

lokiCanary:
  enabled: true

memcached:
  enabled: true
  extraArgs:
    - -I 512m
    - -m 1536
  replicas: 3
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 256Mi

minio:
  enabled: false

monitoring:
  dashboards:
    enabled: false
  rules:
    enabled: false
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  serviceMonitor:
    enabled: false

read:
  extraEnv:
    - name: GOMEMLIMIT
      value: 9GiB
  # KEY FIX: HPA was disabled before — 3 static read pods were the primary bottleneck.
  # Enabling this allows the cluster to scale up read pods under query load.
  horizontalPodAutoscaler:
    enabled: true
    maxReplicas: 6
    metrics:
      - resource:
          name: cpu
          target:
            averageUtilization: 70
            type: Utilization
        type: Resource
      - resource:
          name: memory
          target:
            averageUtilization: 75
            type: Utilization
        type: Resource
    # Raised minReplicas from 3 → 6 so there is always enough read capacity
    minReplicas: 3
  # Keep static replicas at 6 to match HPA minReplicas on initial deploy
  replicas: 3
  resources:
    limits:
      cpu: 8
      memory: 12Gi
    requests:
      cpu: 100m
      memory: 256Mi
  terminationGracePeriodSeconds: 120

resultsCache:
  args:
    - -I 512m
  defaultValidity: 24h
  enabled: true
  timeout: 1000ms
  writebackBuffer: 1000000
  writebackParallelism: 2
  writebackSizeLimit: 1GB

write:
  config:
    wal:
      enabled: true
      dir: /var/loki/wal
      replay_memory_ceiling: 24GB  # WAL FIX: Raised 8GB → 24GB — gives WAL enough headroom vs 60Gi pod limit
      flush_on_shutdown: true
      checkpoint_duration: 10m     # WAL FIX: Raised 2m → 10m — too-frequent checkpointing caused WAL write amplification
      max_transfer_retries: 0      # WAL FIX: Disable transfer retries — failed transfers were blocking WAL segment deletion
  extraEnv:
    - name: GOMEMLIMIT
      value: 48GiB   # WAL FIX: Lowered 54GiB → 48GiB — more GC headroom vs 60Gi limit reduces stalls that block WAL draining
    - name: GOGC
      value: "100"   # WAL FIX: Raised 70 → 100 — less aggressive GC reduces CPU competition with flush goroutines
  replicas: 4
  resources:
    limits:
      cpu: 4
      memory: 60Gi
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    volumeClaimsEnabled: true
    accessModes:
      - ReadWriteOnce
    enableStatefulSetAutoDeletePVC: true
    size: 30Gi
    storageClass: gp3-csi
  terminationGracePeriodSeconds: 600

# helm upgrade --install loki grafana-community/loki -n loki -f tools/loki-logs.yml