# Grafana Tempo Distributed - Production Ready Configuration
# Optimized for single-AZ deployment with 7-8 trace sources
# Low resource requests, production-grade limits
# helm upgrade --install tempo grafana-community/tempo-distributed -f tools/traces-tempo.yml -n tempo

# Global settings
global:
  clusterDomain: cluster.local
  extraEnv:
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP

# Extra environment variables
extraEnv:
  - name: AWS_REGION
    value: ap-southeast-2  # Replace with your AWS region
  - name: AWS_SDK_LOAD_CONFIG
    value: "true"

# ServiceAccount with Pod Identity
serviceAccount:
  create: true
  name: tempo
  automountServiceAccountToken: true

# Tempo configuration
tempo:
  structuredConfig:
    # Server configuration
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095
      log_level: info
      grpc_server_max_recv_msg_size: 104857600  # 100MB
      grpc_server_max_send_msg_size: 104857600  # 100MB
      grpc_server_max_concurrent_streams: 1000

    # Distributor configuration
    distributor:
      receivers:
        jaeger:
          protocols:
            thrift_http:
              endpoint: 0.0.0.0:14268
            grpc:
              endpoint: 0.0.0.0:14250
            thrift_binary:
              endpoint: 0.0.0.0:6832
            thrift_compact:
              endpoint: 0.0.0.0:6831
        zipkin:
          endpoint: 0.0.0.0:9411
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
            grpc:
              endpoint: 0.0.0.0:4317
      ring:
        kvstore:
          store: memberlist

    # Ingester configuration
    ingester:
      max_block_duration: 5m
      max_block_bytes: 536870912  # 512MB
      flush_check_period: 10s
      trace_idle_period: 10s
      lifecycler:
        ring:
          kvstore:
            store: memberlist
          replication_factor: 3
        tokens_file_path: /var/tempo/tokens.json
        heartbeat_period: 5s
        num_tokens: 128

    # Compactor configuration
    compactor:
      compaction:
        block_retention: 168h  # 7 days
        compacted_block_retention: 1h
        compaction_window: 1h
        max_compaction_objects: 6000000
        max_block_bytes: 107374182400  # 100GB
        retention_concurrency: 10
        max_time_per_tenant: 5m
        compaction_cycle: 30s
      ring:
        kvstore:
          store: memberlist

    # Metrics Generator configuration
    metrics_generator:
      ring:
        kvstore:
          store: memberlist
      processor:
        local_blocks:
          max_live_traces: 50000
          flush_to_storage: true
          trace_idle_period: 10s
          max_block_duration: 5m
          max_block_bytes: 524288000  # 500MB
        service_graphs:
          max_items: 10000
          wait: 10s
          workers: 10
        span_metrics:
          dimensions:
            - http.method
            - http.status_code
            - http.target
            - service.version
          histogram_buckets:
            - 0.1
            - 0.2
            - 0.4
            - 0.8
            - 1.6
            - 3.2
            - 6.4
            - 12.8
          enable_target_info: true
      storage:
        path: /var/tempo/generator/wal
        remote_write_flush_deadline: 1m
        remote_write:
          - url: http://mimir-gateway.mimir/api/v1/push  # Update with your Prometheus/Mimir endpoint
            send_exemplars: true

    # Storage configuration
    storage:
      trace:
        backend: s3
        blocklist_poll: 5m
        s3:
          bucket: otel-traces-597088041925-ap-southeast-2-an  # Replace with your S3 bucket name
          endpoint: s3.ap-southeast-2.amazonaws.com  # Replace with your region endpoint
          region: ap-southeast-2  # Replace with your AWS region
          insecure: false
          # Using Pod Identity - no credentials needed
        wal:
          path: /var/tempo/wal
          v2_encoding: snappy
        block:
          bloom_filter_false_positive: 0.01
          v2_encoding: zstd
          v2_index_downsample_bytes: 1048576  # 1MB
        pool:
          max_workers: 100
          queue_depth: 10000

    # Cache configuration (Tempo 2.4+ format)
    cache:
      background:
        writeback_goroutines: 10
        writeback_buffer: 10000
      caches:
        - roles:
            - parquet-footer
            - bloom
            - frontend-search
          memcached:
            host: tempo-memcached.tempo.svc.cluster.local
            timeout: 500ms
            max_idle_conns: 16
            ttl: 1h

    # Querier configuration
    querier:
      max_concurrent_queries: 20
      frontend_worker:
        frontend_address: tempo-query-frontend-discovery:9095
        grpc_client_config:
          max_send_msg_size: 104857600

    # Query Frontend configuration
    query_frontend:
      max_outstanding_per_tenant: 2000
      search:
        concurrent_jobs: 1000
        target_bytes_per_job: 104857600  # 100MB
        max_duration: 24h
      max_retries: 2

    # Memberlist configuration
    memberlist:
      bind_addr:
        - 0.0.0.0
      advertise_addr: ${MY_POD_IP}
      abort_if_cluster_join_fails: false
      join_members:
        - tempo-gossip-ring.tempo.svc.cluster.local:7946
      bind_port: 7946
      dead_node_reclaim_time: 30s
      gossip_interval: 200ms
      gossip_nodes: 3
      packet_dial_timeout: 15s
      packet_write_timeout: 15s
      retransmit_factor: 4
      min_join_backoff: 1s
      max_join_backoff: 1m
      max_join_retries: 20

    # Overrides configuration (Tempo 2.7+ nested format)
    overrides:
      defaults:
        ingestion:
          rate_limit_bytes: 15000000  # 15MB/s per tenant
          burst_size_bytes: 20000000  # 20MB burst
        global:
          max_bytes_per_trace: 5000000  # 5MB
        compaction:
          block_retention: 168h  # 7 days
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics
            - local-blocks

# Traces ingestion protocols
traces:
  otlp:
    http:
      enabled: true
      receiverConfig: {}
    grpc:
      enabled: true
      receiverConfig: {}
  jaeger:
    thriftHttp:
      enabled: true
    thriftBinary:
      enabled: true
    thriftCompact:
      enabled: true
    grpc:
      enabled: true
  zipkin:
    enabled: true

# Distributor component
distributor:
  replicas: 3
  extraArgs:
    - -config.expand-env=true
  service:
    type: ClusterIP
  
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 2
      memory: 4Gi
  
  autoscaling:
    enabled: false
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# Ingester component
ingester:
  replicas: 3
  extraArgs:
    - -config.expand-env=true
  persistence:
    enabled: true
    storageClass: gp3-csi
    size: 10Gi
  
  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: 2
      memory: 20Gi
  
  # Single AZ - disable zone aware replication
  zoneAwareReplication:
    enabled: false

# Querier component
querier:
  replicas: 3
  extraArgs:
    - -config.expand-env=true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 2
      memory: 4Gi
  
  autoscaling:
    enabled: false
    minReplicas: 3
    maxReplicas: 6
    targetCPUUtilizationPercentage: 80

# Query Frontend component
queryFrontend:
  replicas: 3
  extraArgs:
    - -config.expand-env=true
  service:
    type: ClusterIP
  
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 2Gi
  
  query:
    enabled: true
    replicas: 1

# Compactor component
compactor:
  replicas: 3
  extraArgs:
    - -config.expand-env=true
  persistence:
    enabled: true
    storageClass: gp3-csi
    size: 20Gi
  
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 2
      memory: 4Gi

# Metrics Generator component
metricsGenerator:
  enabled: true
  replicas: 1
  extraArgs:
    - -config.expand-env=true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 2Gi

# Gateway component (nginx)
gateway:
  enabled: true
  replicas: 3
  
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  
  service:
    type: ClusterIP

# Memcached for caching
memcached:
  enabled: true
  
  # Chunks cache
  chunksCache:
    enabled: true
    replicas: 3
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1
        memory: 3Gi
    allocatedMemory: 2048

# Memcached exporter
memcachedExporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Monitoring
metaMonitoring:
  serviceMonitor:
    enabled: true
    labels:
      prometheus: grafana
  grafanaAgent:
    enabled: false

# RBAC
rbac:
  create: true
  pspEnabled: false

# Security context
securityContext:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Pod security context for all components
podSecurityContext:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Ingress (optional)
ingress:
  enabled: false
  # For external access:
  # enabled: true
  # className: nginx
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  # hosts:
  #   - host: tempo.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  # tls:
  #   - secretName: tempo-tls
  #     hosts:
  #       - tempo.example.com

# Enterprise features (disabled)
enterprise:
  enabled: false

# Multi-tenancy
multitenancyEnabled: false

# Search enabled
search:
  enabled: true

# Continuous testing (disabled for production)
tempo_continuous_test:
  enabled: false

# Smoke test
smoke_test:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi