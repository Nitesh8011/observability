# ---------------------------------------------------------------------------
# MinIO — in-cluster S3-compatible object store
# Single shared PVC for ALL Mimir components — this is the correct
# architecture. Filesystem backend does NOT work with multiple store-gateway
# replicas because each pod has its own disk and cannot read blocks written
# by another pod or compactor.
# ---------------------------------------------------------------------------
minio:
  enabled: true
  mode: standalone
  persistence:
    enabled: true
    size: 600Gi
    storageClass: gp3-csi
    existingClaim: mimir-minio
  buckets:
    - name: mimir-blocks
      policy: none
      purge: false
    - name: mimir-ruler
      policy: none
      purge: false
    - name: mimir-alertmanager
      policy: none
      purge: false
  rootUser: mimir
  rootPassword: oqckegiubclkzy5n2j3t
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 4Gi

mimir:
  extraArgs:
    memberlist.abort-if-fast-join-fails: "false"
  structuredConfig:
    # ---------------------------------------------------------------------------
    # alertmanager_storage — MinIO S3-compatible
    # ---------------------------------------------------------------------------
    alertmanager_storage:
      backend: s3
      s3:
        bucket_name: mimir-alertmanager
        endpoint: mimir-minio.mimir-ms.svc.cluster.local:9000
        region: us-east-1          # MinIO ignores region but field is required
        access_key_id: mimir
        secret_access_key: oqckegiubclkzy5n2j3t
        insecure: true             # MinIO runs plain HTTP inside cluster
        http:
          insecure_skip_verify: true

    # ---------------------------------------------------------------------------
    # blocks_storage — MinIO S3-compatible
    # All pods (ingesters, compactor, store-gateway) share this single endpoint.
    # ---------------------------------------------------------------------------
    blocks_storage:
      backend: s3
      s3:
        bucket_name: mimir-blocks
        endpoint: mimir-minio.mimir-ms.svc.cluster.local:9000
        region: us-east-1
        access_key_id: mimir
        secret_access_key: oqckegiubclkzy5n2j3t
        insecure: true
        http:
          insecure_skip_verify: true
      bucket_store:
        chunks_cache:
          backend: memcached
          memcached:
            addresses: dnssrvnoa+mimir-chunks-cache.mimir-ms.svc.cluster.local:11211
            max_async_concurrency: 50
            max_idle_connections: 200
        index_cache:
          backend: memcached
          memcached:
            addresses: dnssrvnoa+mimir-index-cache.mimir-ms.svc.cluster.local:11211
            max_async_concurrency: 50
            max_idle_connections: 200
        metadata_cache:
          backend: memcached
          memcached:
            addresses: dnssrvnoa+mimir-metadata-cache.mimir-ms.svc.cluster.local:11211
            max_idle_connections: 200
        sync_dir: /data/tsdb-sync
        sync_interval: 30s
      tsdb:
        block_ranges_period:
          - 2h
        dir: /data/tsdb
        head_compaction_idle_timeout: 1h
        head_compaction_interval: 1m
        retention_period: 13h
        ship_concurrency: 10
        ship_interval: 1m

    # ---------------------------------------------------------------------------
    # common storage — MinIO S3-compatible
    # ---------------------------------------------------------------------------
    common:
      storage:
        backend: s3
        s3:
          bucket_name: mimir-blocks
          endpoint: mimir-minio.mimir-ms.svc.cluster.local:9000
          region: us-east-1
          access_key_id: mimir
          secret_access_key: oqckegiubclkzy5n2j3t
          insecure: true
          http:
            insecure_skip_verify: true

    compactor:
      block_ranges:
        - 2h
        - 12h
        - 24h
      compaction_concurrency: 8
      compaction_interval: 15m
      data_dir: /data/compactor
      deletion_delay: 12h
      tenant_cleanup_delay: 6h

    # ---------------------------------------------------------------------------
    # Compression — gRPC internal traffic
    # zstd is not yet supported for grpc_compression in Mimir (issue #8522).
    # s2 is the best available option: ~53% traffic reduction, low CPU overhead.
    # Supported values: snappy | gzip | s2
    # ---------------------------------------------------------------------------
    ingester_client:
      grpc_client_config:
        grpc_compression: s2   # distributor → ingester (highest-volume path)

    distributor:
      ha_tracker:
        enable_ha_tracker: true
        kvstore:
          store: memberlist
      instance_limits:
        max_inflight_push_requests: 30000
      pool:
        health_check_ingesters: true
      remote_timeout: 60s

    frontend:
      cache_results: true
      parallelize_shardable_queries: true
      results_cache:
        backend: memcached
        memcached:
          addresses: dnssrvnoa+mimir-results-cache.mimir-ms.svc.cluster.local:11211
          max_idle_connections: 200
      split_queries_by_interval: 6h

    ingester:
      instance_limits:
        max_inflight_push_requests: 30000
        max_ingestion_rate: 10000000
        max_series: 5000000
      ring:
        heartbeat_period: 5s
        heartbeat_timeout: 1m
        kvstore:
          store: memberlist
        replication_factor: 3

    limits:
      cardinality_analysis_enabled: true
      compactor_blocks_retention_period: 30d
      ha_cluster_label: cluster
      ha_replica_label: prometheus_replica
      ingestion_burst_size: 2000000
      ingestion_rate: 1000000
      max_global_metadata_per_metric: 10000
      max_global_metadata_per_user: 100000
      max_global_series_per_metric: 500000
      max_global_series_per_user: 10000000
      max_label_name_length: 1024
      max_label_names_per_series: 30
      max_label_value_length: 2048
      max_query_lookback: 30d
      out_of_order_time_window: 5m
      query_ingesters_within: 13h
      max_query_parallelism: 240

    memberlist:
      bind_addr:
        - 0.0.0.0
      advertise_addr: ${MY_POD_IP}
      abort_if_cluster_join_fails: false
      join_members:
        - mimir-gossip-ring.{{ .Release.Namespace }}.svc.cluster.local:7946
      bind_port: 7946
      dead_node_reclaim_time: 30s
      gossip_interval: 200ms
      gossip_nodes: 3
      packet_dial_timeout: 15s
      packet_write_timeout: 15s
      retransmit_factor: 4
      min_join_backoff: 1s
      max_join_backoff: 1m
      max_join_retries: 20

    multitenancy_enabled: true

    querier:
      lookback_delta: 5m
      max_concurrent: 32
      timeout: 5m
      store_gateway_client:
        grpc_compression: s2   # querier → store-gateway

    frontend_worker:
      grpc_client_config:
        grpc_compression: s2   # query-frontend ↔ query-scheduler

    # ---------------------------------------------------------------------------
    # ruler_storage — MinIO S3-compatible
    # ---------------------------------------------------------------------------
    ruler_storage:
      backend: s3
      s3:
        bucket_name: mimir-ruler
        endpoint: mimir-minio.mimir-ms.svc.cluster.local:9000
        region: us-east-1
        access_key_id: mimir
        secret_access_key: oqckegiubclkzy5n2j3t
        insecure: true
        http:
          insecure_skip_verify: true

    server:
      grpc_server_max_concurrent_streams: 1000
      grpc_server_max_recv_msg_size: 104857600
      grpc_server_max_send_msg_size: 104857600
      http_server_write_timeout: 5m
      http_server_read_timeout: 5m

    store_gateway:
      sharding_ring:
        kvstore:
          store: memberlist
        replication_factor: 3

    usage_stats:
      enabled: false

