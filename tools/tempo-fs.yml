# Grafana Tempo Distributed - Production Ready Configuration
# Backend: MinIO (in-cluster S3-compatible) — fixes local filesystem distributed mode limitation
# All components share the same MinIO bucket — ring, metrics-generator, querier all work correctly
# 30 day retention | MinIO PVC 600Gi (single shared volume)
# helm upgrade --install tempo grafana/tempo-distributed -f tools/tempo-fs.yml -n tempo-ms

# ---------------------------------------------------------------------------
# Global overrides — MUST be top-level, NOT inside tempo.structuredConfig
# (structuredConfig uses legacyConfig parser which rejects defaults: block)
# ---------------------------------------------------------------------------
global_overrides:
  defaults:
    ingestion:
      rate_limit_bytes: 15000000
      burst_size_bytes: 20000000
    global:
      max_bytes_per_trace: 5000000
    compaction:
      block_retention: 720h
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
        - local-blocks

# Global settings
global:
  clusterDomain: cluster.local
  extraEnv:
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP

extraEnv: []

serviceAccount:
  create: true
  name: tempo
  automountServiceAccountToken: true

# ---------------------------------------------------------------------------
# MinIO — in-cluster S3-compatible object store
# Single 600Gi PVC shared by ALL Tempo components — this is the correct
# architecture for distributed Tempo. Local filesystem backend does NOT work
# in distributed mode because each pod has its own disk and no pod can read
# blocks written by another pod.
# ---------------------------------------------------------------------------
minio:
  enabled: true
  mode: standalone
  persistence:
    enabled: true
    size: 600Gi
    storageClass: gp3-csi
  buckets:
    - name: tempo-traces
      policy: none
      purge: false
  rootUser: tempo
  rootPassword: oqckegiubclkzy5n2j3t
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 4Gi

# ---------------------------------------------------------------------------
# Tempo configuration
# ---------------------------------------------------------------------------
tempo:
  structuredConfig:
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095
      log_level: info
      grpc_server_max_recv_msg_size: 104857600  # 100MB
      grpc_server_max_send_msg_size: 104857600  # 100MB
      grpc_server_max_concurrent_streams: 1000

    overrides:
      defaults:
        ingestion:
          rate_limit_bytes: 15000000
          burst_size_bytes: 20000000
        global:
          max_bytes_per_trace: 5000000
        compaction:
          block_retention: 720h
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics
            - local-blocks

    distributor:
      receivers:
        jaeger:
          protocols:
            thrift_http:
              endpoint: 0.0.0.0:14268
            grpc:
              endpoint: 0.0.0.0:14250
            thrift_binary:
              endpoint: 0.0.0.0:6832
            thrift_compact:
              endpoint: 0.0.0.0:6831
        zipkin:
          endpoint: 0.0.0.0:9411
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
            grpc:
              endpoint: 0.0.0.0:4317
      ring:
        kvstore:
          store: memberlist

    ingester:
      max_block_duration: 3m
      max_block_bytes: 536870912  # 512MB
      flush_check_period: 10s
      trace_idle_period: 10s
      lifecycler:
        ring:
          kvstore:
            store: memberlist
          replication_factor: 3
        tokens_file_path: /var/tempo/tokens.json
        heartbeat_period: 5s
        num_tokens: 128

    compactor:
      compaction:
        block_retention: 720h  # 30 days
        compacted_block_retention: 1h
        compaction_window: 1h
        max_compaction_objects: 6000000
        max_block_bytes: 107374182400  # 100GB
        retention_concurrency: 10
        max_time_per_tenant: 5m
        compaction_cycle: 30s
      ring:
        kvstore:
          store: memberlist

    metrics_generator:
      ring:
        kvstore:
          store: memberlist
        instance_addr: ${MY_POD_IP}
      processor:
        local_blocks:
          max_live_traces: 50000
          flush_to_storage: true
          trace_idle_period: 10s
          max_block_duration: 5m
          max_block_bytes: 524288000  # 500MB
        service_graphs:
          max_items: 10000
          wait: 10s
          workers: 10
        span_metrics:
          dimensions:
            - http.method
            - http.status_code
            - http.target
            - service.version
          histogram_buckets:
            - 0.1
            - 0.2
            - 0.4
            - 0.8
            - 1.6
            - 3.2
            - 6.4
            - 12.8
          enable_target_info: true
      storage:
        path: /var/tempo/generator/wal
        remote_write_flush_deadline: 1m
        remote_write:
          - url: http://mimir-gateway.mimir-ms.svc.cluster.local/api/v1/push
            send_exemplars: true

    # ---------------------------------------------------------------------------
    # Storage — MinIO S3-compatible backend
    # All pods share this single endpoint — ingesters flush blocks here,
    # queriers read from here, compactor merges here. Ring works correctly.
    # ---------------------------------------------------------------------------
    storage:
      trace:
        backend: s3
        blocklist_poll: 2m
        s3:
          bucket: tempo-traces
          endpoint: tempo-minio.tempo-ms.svc.cluster.local:9000
          region: ap-southeast-2          # MinIO ignores region but field is required
          access_key: tempo
          secret_key: oqckegiubclkzy5n2j3t
          insecure: true             # MinIO runs plain HTTP inside cluster
          forcepathstyle: true       # required for MinIO path-style access
        wal:
          path: /var/tempo/wal
          v2_encoding: snappy
        block:
          bloom_filter_false_positive: 0.01
          v2_encoding: zstd
          v2_index_downsample_bytes: 1048576
        pool:
          max_workers: 100
          queue_depth: 10000

    cache:
      background:
        writeback_goroutines: 10
        writeback_buffer: 10000
      caches:
        - roles:
            - parquet-footer
            - bloom
            - frontend-search
          memcached:
            host: tempo-memcached.tempo-ms.svc.cluster.local
            timeout: 2000ms
            max_idle_conns: 32
            ttl: 1h

    querier:
      max_concurrent_queries: 40
      frontend_worker:
        frontend_address: tempo-query-frontend-discovery.tempo-ms.svc.cluster.local:9095
        grpc_client_config:
          max_send_msg_size: 104857600

    query_frontend:
      max_outstanding_per_tenant: 4000
      search:
        concurrent_jobs: 2000
        target_bytes_per_job: 104857600
        max_duration: 0
      max_retries: 3
      metrics:
        concurrent_jobs: 2000
        target_bytes_per_job: 104857600
        max_duration: 0
        query_backend_after: 5m
        interval: 5m   
    memberlist:
      bind_addr:
        - 0.0.0.0
      advertise_addr: ${MY_POD_IP}
      abort_if_cluster_join_fails: false
      join_members:
        - tempo-gossip-ring.tempo-ms.svc.cluster.local:7946
      bind_port: 7946
      dead_node_reclaim_time: 30s
      gossip_interval: 200ms
      gossip_nodes: 3
      packet_dial_timeout: 15s
      packet_write_timeout: 15s
      retransmit_factor: 4
      min_join_backoff: 1s
      max_join_backoff: 1m
      max_join_retries: 20

# ---------------------------------------------------------------------------
# Traces ingestion protocols
# ---------------------------------------------------------------------------
traces:
  otlp:
    http:
      enabled: true
      receiverConfig: {}
    grpc:
      enabled: true
      receiverConfig: {}
  jaeger:
    thriftHttp:
      enabled: true
    thriftBinary:
      enabled: true
    thriftCompact:
      enabled: true
    grpc:
      enabled: true
  zipkin:
    enabled: true

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
distributor:
  replicas: 3
  extraArgs:
    - -config.expand-env=true
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 2
      memory: 4Gi
  autoscaling:
    enabled: false
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75

# Ingester WAL only — blocks are flushed to MinIO after max_block_duration (3m)
# No need for large PVC — 20Gi is enough for the WAL buffer
ingester:
  replicas: 3
  extraArgs:
    - -config.expand-env=true
  persistence:
    enabled: true
    storageClass: gp3-csi
    size: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: 2
      memory: 20Gi
  zoneAwareReplication:
    enabled: false

querier:
  replicas: 3
  extraArgs:
    - -config.expand-env=true
  extraEnv:
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 2
      memory: 4Gi
  autoscaling:
    enabled: false
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

queryFrontend:
  replicas: 3
  extraArgs:
    - -config.expand-env=true
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 2
      memory: 4Gi
  query:
    enabled: true
    replicas: 1

# Compactor scratch space only
compactor:
  replicas: 3
  extraArgs:
    - -config.expand-env=true
  persistence:
    enabled: true
    storageClass: gp3-csi
    size: 50Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 2
      memory: 4Gi

metricsGenerator:
  enabled: true
  replicas: 2
  extraArgs:
    - -config.expand-env=true
  extraEnv:
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 2
      memory: 4Gi

gateway:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  service:
    type: ClusterIP

memcached:
  enabled: true
  chunksCache:
    enabled: true
    replicas: 3
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1
        memory: 3Gi
    allocatedMemory: 2048

memcachedExporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

metaMonitoring:
  serviceMonitor:
    enabled: true
    labels:
      prometheus: grafana
  grafanaAgent:
    enabled: false

rbac:
  create: true
  pspEnabled: false

securityContext:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

podSecurityContext:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

ingress:
  enabled: false
enterprise:
  enabled: false
multitenancyEnabled: false
search:
  enabled: true
tempo_continuous_test:
  enabled: false

smoke_test:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi