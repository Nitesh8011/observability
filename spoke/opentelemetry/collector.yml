---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
  labels:
    app.kubernetes.io/instance: collector
    app.kubernetes.io/component: opentelemetry
spec:
  deploymentUpdateStrategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  config:
    exporters:
      otlp/hub:
        endpoint: aa62716946a534acfb287b12a743c939-98fd0acbcf73ce7a.elb.ap-southeast-2.amazonaws.com:4317
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889
    processors:
      attributes/relabel:
        actions:
          - action: upsert
            from_attribute: k8s.namespace.name
            key: k8s.namespace.name
          - action: upsert
            from_attribute: k8s.pod.name
            key: k8s.pod.name
          - action: upsert
            from_attribute: k8s.container.name
            key: k8s.container.name
          - action: upsert
            from_attribute: k8s.deployment.name
            key: k8s.deployment.name
          - action: upsert
            from_attribute: k8s.namespace.name
            key: namespace
          - action: upsert
            from_attribute: k8s.pod.name
            key: pod
          - action: upsert
            from_attribute: k8s.container.name
            key: app
          - action: upsert
            from_attribute: k8s.deployment.name
            key: deployment
      batch:
        send_batch_max_size: 2048
        send_batch_size: 1024
        timeout: 1s
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.container.name
            - k8s.deployment.name
            - k8s.node.name
          labels:
            - tag_name: k8s.pod.label.app
              key: app
              from: pod
            - tag_name: k8s.pod.label.version
              key: version
              from: pod
        passthrough: false
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection
      memory_limiter:
        check_interval: 2s
        limit_percentage: 85
        spike_limit_percentage: 25
    receivers:
      hostmetrics:
        collection_interval: 10s
        scrapers:
          cpu: {}
          load: {}
          memory: {}
          network: {}
      jaeger:
        protocols:
          grpc:
            endpoint: 0.0.0.0:14250
          thrift_compact:
            endpoint: 0.0.0.0:6831
          thrift_http:
            endpoint: 0.0.0.0:14268
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    service:
      pipelines:
        metrics:
          receivers: [otlp, hostmetrics]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [prometheus]
        traces:
          receivers: [otlp, jaeger]
          processors: [memory_limiter, k8sattributes, attributes/relabel, batch]
          exporters: [otlp/hub]
      telemetry:
        logs:
          level: info
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
  mode: daemonset
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  managementState: managed
  upgradeStrategy: automatic
  daemonSetUpdateStrategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  image: 'otel/opentelemetry-collector-contrib:0.133.0'
  ipFamilyPolicy: SingleStack
  configVersions: 3
---