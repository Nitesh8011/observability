apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  labels:
    app.kubernetes.io/component: opentelemetry
    app.kubernetes.io/instance: agent
  name: otel-agent
  namespace: opentelemetry
spec:
  config:
    receivers:
      filelog:
        include:
          - /var/log/pods/fuse-eu_*/*/*.log
        include_file_name: false
        include_file_path: true
        operators:
          - id: container-parser
            type: container
        start_at: end
      hostmetrics:
        collection_interval: 30s
        scrapers:
          cpu: {}
          disk: {}
          filesystem: {}
          load: {}
          memory: {}
          network: {}
          processes: {}
      k8s_cluster:
        collection_interval: 30s
        node_conditions_to_report:
          - Ready
          - MemoryPressure
          - DiskPressure
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    exporters:
      otlp:
        endpoint: otel-gateway.prospecta.com:443
        headers:
          authorization: Bearer ${env:OTEL_AUTH_TOKEN}
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_elapsed_time: 300s
          max_interval: 30s
        sending_queue:
          enabled: true
          num_consumers: 8
          queue_size: 1000
        timeout: 30s
        tls:
          ca_file: /client-ca/ca.crt
          cert_file: /client-tls/tls.crt
          insecure: false
          key_file: /client-tls/tls.key
      prometheus:
        endpoint: 0.0.0.0:8889
    processors:
      batch:
        send_batch_max_size: 4096
        send_batch_size: 2048
        timeout: 30s
      filter:
        metrics:
          exclude:
            match_type: regexp
            metric_names:
              - target_info
              - otel.*
              - otlp_.*
              - scrape_.*
              - go_.*
              - process_.*
              - rpc_.*
              - system_.*
              - exported_.*
              - queueSize_ratio
              - processedLogs_total
              - processedSpans_total
      filter/drop_long_logs:
        error_mode: ignore
        logs:
          log_record:
            - Len(body) > 10000
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.pod.name
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
        filter:
          node_from_env_var: K8S_NODE_NAME
        passthrough: false
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      memory_limiter:
        check_interval: 1s
        limit_mib: 3700
        limit_percentage: 75
        spike_limit_mib: 200
        spike_limit_percentage: 15
      resource:
        attributes:
          - action: insert
            key: cluster.name
            value: europe
          - action: insert
            from_attribute: k8s.pod.name
            key: pod
          - action: insert
            from_attribute: k8s.namespace.name
            key: namespace
          - action: insert
            from_attribute: k8s.container.name
            key: container
      resource/cleanup:
        attributes:
          - action: delete
            key: k8s.replicaset.uid
          - action: delete
            key: k8s.pod.uid
          - action: delete
            key: telemetry.sdk.name
          - action: delete
            key: telemetry.sdk.language
          - action: delete
            key: telemetry.sdk.version
          - action: delete
            key: telemetry.auto.version
          - action: delete
            key: telemetry.distro.name
          - action: delete
            key: telemetry.distro.version
          - action: delete
            key: process.pid
          - action: delete
            key: process.executable.path
          - action: delete
            key: process.command_line
          - action: delete
            key: process.command_args
          - action: delete
            key: process.runtime.name
          - action: delete
            key: process.runtime.version
          - action: delete
            key: process.runtime.description
          - action: delete
            key: host.name
          - action: delete
            key: host.arch
          - action: delete
            key: os.type
          - action: delete
            key: os.description
          - action: delete
            key: container.id
          - action: delete
            key: k8s.pod.ip
          - action: delete
            key: k8s.node.name
          - action: delete
            key: k8s.container.name
          - action: delete
            key: k8s.replicaset.name
          - action: delete
            key: k8s.statefulset.name
          - action: delete
            key: k8s.daemonset.name
          - action: delete
            key: service.instance.id
          - action: delete
            key: service.version
          - action: delete
            key: severity_number
          - action: delete
            key: severity_text
      transform:
        metric_statements:
          - context: datapoint
            statements:
              - set(attributes["pod"], resource.attributes["k8s.pod.name"])
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
        path: /
    service:
      extensions:
        - health_check
      telemetry:
        logs:
          level: info
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      pipelines:
        logs:
          exporters:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - resource
            - resource/cleanup
            - filter/drop_long_logs
            - batch
          receivers:
            - otlp
            - filelog
        metrics:
          exporters:
            - prometheus
          processors:
            - memory_limiter
            - k8sattributes
            - resource
            - filter
            - batch
          receivers:
            - otlp
            - hostmetrics
        traces:
          exporters:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - resource
            - resource/cleanup
            - batch
          receivers:
            - otlp
  deploymentUpdateStrategy: {}
  env:
    - name: OTEL_AUTH_TOKEN
      valueFrom:
        secretKeyRef:
          key: OTEL_AUTH_TOKEN
          name: otel-agent-token
    - name: GOGC
      value: '70'
    - name: GOMEMLIMIT
      value: 3700MiB
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  image: >-
    ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.149.0
  ingress:
    route: {}
  managementState: managed
  mode: daemonset
  observability:
    metrics: {}
  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: 'true'
  replicas: 5
  resources:
    limits:
      cpu: '1'
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 512Mi
  targetAllocator:
    allocationStrategy: consistent-hashing
    filterStrategy: relabel-config
    observability:
      metrics: {}
    prometheusCR:
      scrapeInterval: 30s
    resources: {}
  updateStrategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  upgradeStrategy: automatic
  volumeMounts:
    - mountPath: /client-tls
      name: client-tls
      readOnly: true
    - mountPath: /client-ca
      name: client-ca
      readOnly: true
    - mountPath: /var/log/pods
      name: varlogpods
      readOnly: true
  volumes:
    - name: client-tls
      secret:
        secretName: otel-agent-tls
    - name: client-ca
      secret:
        secretName: otel-agent-ca
    - hostPath:
        path: /var/log/pods
        type: Directory
      name: varlogpods