apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-agent
  namespace: opentelemetry
  labels:
    app.kubernetes.io/component: opentelemetry
    app.kubernetes.io/instance: agent
spec:
  networkPolicy:
    enabled: true
  observability:
    metrics: {}
  deploymentUpdateStrategy: {}
  config:
    exporters:
      otlp:
        compression: zstd
        endpoint: 'otel-gateway.example.com:443'
        headers:
          authorization: 'Bearer ${env:OTEL_AUTH_TOKEN}'
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_elapsed_time: 300s
          max_interval: 30s
        sending_queue:
          enabled: true
          num_consumers: 16
          queue_size: 5000
        timeout: 30s
        tls:
          ca_file: /client-ca/ca.crt
          cert_file: /client-tls/tls.crt
          insecure: false
          key_file: /client-tls/tls.key
    extensions:
      health_check:
        endpoint: '0.0.0.0:13133'
        path: /
    processors:
      resource/metrics:
        attributes:
          - action: upsert
            key: k8s.node.name
            value: '${env:K8S_NODE_NAME}'
      resource/cleanup:
        attributes:
          - action: delete
            key: k8s.replicaset.uid
          - action: delete
            key: k8s.pod.uid
          - action: delete
            key: telemetry.sdk.name
          - action: delete
            key: telemetry.sdk.language
          - action: delete
            key: telemetry.sdk.version
          - action: delete
            key: telemetry.auto.version
          - action: delete
            key: telemetry.distro.name
          - action: delete
            key: telemetry.distro.version
          - action: delete
            key: process.pid
          - action: delete
            key: process.executable.path
          - action: delete
            key: process.command_line
          - action: delete
            key: process.command_args
          - action: delete
            key: process.runtime.name
          - action: delete
            key: process.runtime.version
          - action: delete
            key: process.runtime.description
          - action: delete
            key: host.name
          - action: delete
            key: host.arch
          - action: delete
            key: os.type
          - action: delete
            key: os.description
          - action: delete
            key: container.id
          - action: delete
            key: k8s.pod.ip
          - action: delete
            key: k8s.node.name
          - action: delete
            key: k8s.container.name
          - action: delete
            key: k8s.replicaset.name
          - action: delete
            key: k8s.daemonset.name
          - action: delete
            key: service.instance.id
          - action: delete
            key: service.version
          - action: delete
            key: severity_number
          - action: delete
            key: severity_text
      memory_limiter:
        check_interval: 1s
        limit_mib: 3700
        limit_percentage: 75
        spike_limit_mib: 200
        spike_limit_percentage: 15
      resource:
        attributes:
          - action: insert
            key: cluster.name
            value: YOUR-CLUSTER-NAME
      transform/add_cluster_label:
        metric_statements:
          - context: datapoint
            statements:
              - 'set(attributes["cluster"], resource.attributes["cluster.name"])'
      batch/metrics:
        send_batch_size: 512
        timeout: 5s
      k8s_attributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.pod.name
            - k8s.cronjob.name
            - k8s.job.name
        passthrough: false
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      resource/pulsar-metrics:
        attributes:
          - action: upsert
            key: k8s.node.name
            value: '${env:K8S_NODE_NAME}'
      filter/pulsar-noisy:
        metrics:
          exclude:
            match_type: regexp
            metric_names:
              - pulsar_consumer_.*
              - pulsar_producer_.*
      filter:
        metrics:
          exclude:
            match_type: regexp
            metric_names:
              - target_info
              - otel.*
              - otlp_.*
              - scrape_.*
              - go_.*
              - process_.*
              - rpc_.*
              - system_.*
              - exported_.*
              - queueSize_ratio
              - processedLogs_total
              - processedSpans_total
      filter/drop_long_logs:
        error_mode: ignore
        logs:
          log_record:
            - body != nil and Len(body) > 500

      # ── NEW: trim oversized attribute values, keep body intact ──────────────
      # Runs after severity/length filters so only survivors are transformed.
      transform/trim_log_attributes:
        log_statements:
          - context: log
            statements:
              - truncate_all(attributes, 128)
      batch:
        send_batch_max_size: 2048
        send_batch_size: 1024
        timeout: 10s
      memory_limiter/metrics:
        check_interval: 5s
        limit_mib: 256
    receivers:
      filelog:
        include:
          - /var/log/pods/load-testing*/*/*.log
        include_file_name: false
        include_file_path: true
        operators:
          - id: container-parser
            type: container
        start_at: end
      hostmetrics:
        collection_interval: 30s
        scrapers:
          cpu: {}
          disk: {}
          filesystem: {}
          load: {}
          memory: {}
          network: {}
          processes: {}
      k8s_cluster:
        collection_interval: 30s
        node_conditions_to_report:
          - Ready
          - MemoryPressure
          - DiskPressure
      otlp:
        protocols:
          grpc:
            endpoint: '0.0.0.0:4317'
          http:
            endpoint: '0.0.0.0:4318'
      prometheus:
        config:
          scrape_configs:
            - job_name: otel-self
              static_configs:
                - targets:
                    - 'localhost:8889'
    service:
      extensions:
        - health_check
      pipelines:
        logs:
          exporters:
            - otlp
          processors:
            - memory_limiter
            - k8s_attributes
            - resource
            - resource/cleanup
            - filter/drop_long_logs
            - transform/trim_log_attributes
            - batch
          receivers:
            - filelog
        metrics:
          exporters:
            - otlp
          processors:
            - memory_limiter
            - k8s_attributes
            - resource
            - resource/cleanup
            - filter
            - transform/add_cluster_label
            - batch
          receivers:
            - otlp
            - hostmetrics
            - k8s_cluster
            - prometheus
        traces:
          exporters:
            - otlp
          processors:
            - memory_limiter
            - k8s_attributes
            - resource/cleanup
            - resource
            - batch
          receivers:
            - otlp
      telemetry:
        logs:
          level: info
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
  mode: daemonset
  resources: {}
  podDnsConfig: {}
  podSecurityContext:
    runAsUser: 0
    seLinuxOptions:
      type: spc_t
  env:
    - name: OTEL_AUTH_TOKEN
      valueFrom:
        secretKeyRef:
          key: OTEL_AUTH_TOKEN
          name: otel-agent-token
    - name: GOGC
      value: '70'
    - name: GOMEMLIMIT
      value: 3700MiB
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  managementState: managed
  upgradeStrategy: automatic
  volumeMounts:
    - mountPath: /client-tls
      name: client-tls
      readOnly: true
    - mountPath: /client-ca
      name: client-ca
      readOnly: true
    - mountPath: /var/log/pods
      name: varlogpods
      readOnly: true
  ingress:
    route: {}
  volumes:
    - name: client-tls
      secret:
        secretName: otel-agent-tls
    - name: client-ca
      secret:
        secretName: otel-agent-ca
    - hostPath:
        path: /var/log/pods
        type: Directory
      name: varlogpods
  daemonSetUpdateStrategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  targetAllocator:
    observability:
      metrics: {}
    enabled: true
    resources: {}
    filterStrategy: relabel-config
    allocationStrategy: per-node
    serviceAccount: otel-agent-targetallocator
    prometheusCR:
      enabled: true
      podMonitorSelector:
        matchLabels:
          prometheus: grafana
      probeSelector:
        matchLabels:
          prometheus: grafana
      scrapeInterval: 1m0s
      serviceMonitorSelector:
        matchLabels:
          prometheus: grafana
    replicas: 4
    collectorNotReadyGracePeriod: 30s
    collectorTargetReloadInterval: 30s
  image: 'ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.149.0'
  replicas: 4
  ipFamilyPolicy: SingleStack
  configVersions: 3
  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: 'true'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-role
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
      - nodes
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - services
      - endpoints
      - resourcequotas
      - replicationcontrollers
      - limitranges
      - persistentvolumes
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - nodes/metrics
      - nodes/stats
      - nodes/proxy
    verbs: ["get"]
  - nonResourceURLs:
      - /metrics
      - /metrics/cadvisor
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-role
subjects:
  - kind: ServiceAccount
    name: otel-agent-collector
    namespace: opentelemetry
---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: otel-agent-collector
  namespace: opentelemetry
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::111122223333:role/cw-otel-role
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-agent-targetallocator
  namespace: opentelemetry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-agent-targetallocator-role
rules:
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: [""]
    resources:
      - services
      - endpoints
      - pods
      - nodes
      - namespaces
      - configmaps
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - nodes/metrics
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources:
      - endpointslices
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs:
      - /metrics
      - /api
      - /api/*
      - /apis
      - /apis/*
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-agent-targetallocator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-agent-targetallocator-role
subjects:
  - kind: ServiceAccount
    name: otel-agent-targetallocator
    namespace: opentelemetry

# ─────────────────────────────────────────────────────────────────────────────
# IRSA Setup — run these commands BEFORE applying this manifest
# ─────────────────────────────────────────────────────────────────────────────
#
# 1. Create IAM policy (save as cloudwatch-policy.json first):
#
#    aws iam create-policy \
#      --policy-name otel-agent-cloudwatch-policy \
#      --policy-document file://cloudwatch-policy.json \
#      --profile your-aws-profile
#
# 2. Create IRSA role and attach to service account:
#
#    eksctl create iamserviceaccount \
#      --name otel-agent-collector \
#      --namespace opentelemetry \
#      --cluster <your-cluster-name> \
#      --region ap-southeast-1 \
#      --attach-policy-arn arn:aws:iam::<account-id>:policy/otel-agent-cloudwatch-policy \
#      --override-existing-serviceaccounts \
#      --approve \
#      --profile your-aws-profile
#
# 3. Create credentials secret:
#
#    kubectl create secret generic otel-pg-credentials \
#      --namespace opentelemetry \
#      --from-literal=PG_HOST=your-rds-endpoint.ap-southeast-1.rds.amazonaws.com \
#      --from-literal=PG_MONITOR_PASSWORD=your-password \
#      --from-literal=RDS_INSTANCE_ID=your-rds-instance-identifier
#
# 4. Create RDS CA secret:
#
#    wget https://truststore.pki.rds.amazonaws.com/ap-southeast-1/ap-southeast-1-bundle.pem
#    kubectl create secret generic otel-pg-ca \
#      --namespace opentelemetry \
#      --from-file=ca.crt=./ap-southeast-1-bundle.pem
# ─────────────────────────────────────────────────────────────────────────────