spec:
  replicas: 1
  selector:
    matchLabels:
      app: mdo-core-crud
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: mdo-core-crud
      annotations:
        instrumentation.opentelemetry.io/inject-java: qah-agent-instrumentation
        keel.sh/update-time: 2026-04-28 09:33:23.327808551 +0000 UTC m=+4257552.633168757
        kubectl.kubernetes.io/restartedAt: '2026-04-28T11:28:20Z'
    spec:
      volumes:
        - name: pyroscope-agent
          emptyDir:
            sizeLimit: 100Mi
      initContainers:
        - name: download-pyroscope-agent
          image: curlimages/curl:latest
          command:
            - sh
            - '-c'
            - |
              curl -L -o /pyroscope/pyroscope.jar \
                https://github.com/grafana/pyroscope-java/releases/download/v2.1.4/pyroscope.jar
          resources:
            limits:
              cpu: 50m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: pyroscope-agent
              mountPath: /pyroscope
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
      containers:
        - name: mdo-core-crud
          image: docker.prospecta.com/prospecta/mdo-core-crud:qah
          envFrom:
            - configMapRef:
                name: config-elastic
            - configMapRef:
                name: config-grpc
            - configMapRef:
                name: config-http-private
            - configMapRef:
                name: config-http-public
            - configMapRef:
                name: config-jdbc
            - configMapRef:
                name: config-rmq
            - configMapRef:
                name: config-virtual
            - configMapRef:
                name: es-mdo-core-crud-cm
            - configMapRef:
                name: config-fixme
            - configMapRef:
                name: config-hibernate
            - configMapRef:
                name: graceful-shutdown
            - configMapRef:
                name: mdo-auth-retry
            - configMapRef:
                name: config-hazelcast
            - configMapRef:
                name: dms-starter-cm
            - configMapRef:
                name: env-dms-starter-cm
          env:
            - name: my-pod-name
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: spring.datasource.password
              valueFrom:
                secretKeyRef:
                  name: mdo-secrets
                  key: SPRING_DATASOURCE_PASSWD
            - name: mdo.config.jwt_rsk
              valueFrom:
                secretKeyRef:
                  name: mdo-secrets
                  key: MDO_CONFIG_JWT_RSK
            - name: mdo.auth.rsk
              valueFrom:
                secretKeyRef:
                  name: mdo-secrets
                  key: MDO_CONFIG_JWT_RSK
            - name: spring.rabbitmq.password
              valueFrom:
                secretKeyRef:
                  name: mdo-secrets
                  key: SPRING_RABBITMQ_PASSWD
            - name: mdo.mainES.password
              valueFrom:
                secretKeyRef:
                  name: esmain-es-internal-users
                  key: elastic-internal
            - name: mdo.diwES.password
              valueFrom:
                secretKeyRef:
                  name: esdiw-es-internal-users
                  key: elastic-internal
            - name: spring.datasource.dms.password
              valueFrom:
                secretKeyRef:
                  name: mdo-secrets
                  key: SPRING_DATASOURCE_PASSWD
            - name: mdo.config.dms.store.aws.accessKey
              valueFrom:
                secretKeyRef:
                  name: mdo-secrets
                  key: DMS_STORE_ACCESS_KEY
            - name: mdo.config.dms.store.connekthub.accessKey
              valueFrom:
                secretKeyRef:
                  name: mdo-secrets
                  key: CONNEKTHUB_AWS_ACCESS_KEY
            - name: mdo.config.dms.store.aws.secretAccessKey
              valueFrom:
                secretKeyRef:
                  name: mdo-secrets
                  key: DMS_STORE_ACCESS_KEY_SECRET
            - name: mdo.config.dms.store.connekthub.secretAccessKey
              valueFrom:
                secretKeyRef:
                  name: mdo-secrets
                  key: CONNEKTHUB_AWS_SECRET_KEY
            - name: library.token
              valueFrom:
                secretKeyRef:
                  name: mdo-secrets
                  key: LIBRARY_TOKEN
            - name: spring.datasource.replica.password
              valueFrom:
                secretKeyRef:
                  name: mdo-secrets
                  key: SPRING_DATASOURCE_REPLICA_PASSWORD
            - name: spring.datasource.hikari.maximum-pool-size
              value: '60'
            - name: server.sparkVersion
              value: junk
            - name: server.sparkHome
              value: junk
            - name: server.sparkPostgresVersion
              value: junk
            - name: server.sparkJooqVersion
              value: junk
            - name: server.sparkReactiveVersion
              value: junk
            - name: server.sparkEndpoint
              value: junk
            - name: server.sparkHdfsPath
              value: junk
            - name: mdospark.path
              value: junk
            - name: mdospark.homepath
              value: junk
            - name: mdospark.version
              value: junk
            - name: mdospark.version
              value: junk
            - name: mdo.enabled.one.sql.daxe
              value: 'true'
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -Xms6G -Xmx12G -XX:ThreadStackSize=512 -XX:+PrintFlagsFinal
                -XX:+UseZGC -XX:+ZGenerational -XX:SoftMaxHeapSize=8192m
                -Xlog:gc,gc+heap=info,gc+cpu=info:stdout:time,uptime,level,tags
                -Dcom.sun.management.jmxremote
                -Dcom.sun.management.jmxremote.port=9010
                -Dcom.sun.management.jmxremote.rmi.port=9010
                -Dcom.sun.management.jmxremote.authenticate=false
                -Dcom.sun.management.jmxremote.ssl=false
                -Djava.rmi.server.hostname=localhost
                -javaagent:/pyroscope/pyroscope.jar
                -Dpyroscope.application.name=mdo-core-crud-d
                -Dpyroscope.server.address=https://pyroscope-hub.prospecta.com
                -Dpyroscope.format=jfr -Dpyroscope.profiler.event=itimer
                -Dpyroscope.profiler.alloc=512k -Dpyroscope.profiler.lock=10ms
                -Dpyroscope.profilers.heap=true
                -Dpyroscope.labels=pod=$(my-pod-name),namespace=$(NAMESPACE)
          resources:
            limits:
              cpu: '5'
              memory: 18Gi
            requests:
              cpu: '2'
              memory: 4Gi
          volumeMounts:
            - name: pyroscope-agent
              readOnly: true
              mountPath: /pyroscope
          livenessProbe:
            httpGet:
              path: /core-crud/actuator/health/liveness
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 90
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /core-crud/actuator/health/readiness
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 90
            successThreshold: 2
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /core-crud/actuator/health/readiness
              port: 8080
              scheme: HTTP
            timeoutSeconds: 5
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 35
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - '-c'
                  - sleep 10
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_PTRACE
            privileged: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: mdo
      serviceAccount: mdo
      securityContext: {}
      imagePullSecrets:
        - name: nexus-image-pull
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600