apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/name: opentelemetry
      app.kubernetes.io/component: instrumentation

patches:
  - target:
      kind: Instrumentation
      name: instrumentation
    patch: |-
      - op: add
        path: /metadata/namespace
        value: dev