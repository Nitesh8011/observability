apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: onprem-jaeger-ds
  labels:
    grafana_datasource: jaeger
spec:
  allowCrossNamespaceImport: false
  datasource:
    access: proxy
    jsonData:
      httpHeaderName1: Authorization
      tracesToLogsV2:
        customQuery: true
        datasourceUid: onprem-loki
        filterBySpanID: false
        filterByTraceID: false
        query: '{${__tags}, trace_id="${__trace.traceId}"} '
        spanEndTimeShift: 5m
        spanStartTimeShift: '-5m'
        tags:
          - key: k8s.container.name
            value: app
          - key: k8s.namespace.name
            value: namespace
          - key: k8s.pod.name
            value: pod
    name: onprem-jaeger
    secureJsonData:
      httpHeaderValue1: Bearer ${JAEGER_TOKEN}
    type: jaeger
    uid: onprem-jaeger
    url: 'https://jaeger-route.example.com'
  instanceSelector:
    matchLabels:
      grafana: datasource
  resyncPeriod: 10m0s